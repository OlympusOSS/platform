services:
  # ============================================================
  # PostgreSQL (shared database)
  # ============================================================

  postgres:
    image: docker.io/postgres:18-alpine
    # SSL is enabled via command arguments. The server.key is written by deploy.yml
    # from secrets.PG_SSL_KEY BEFORE this container starts (ordering enforced in deploy.yml).
    # server.key must be mode 600; server.crt and pg-ca.crt are committed to the repo (public).
    #
    # sslmode=verify-full (platform#53): All client DSNs include sslrootcert pointing to
    # pg-ca.crt. PostgreSQL presents server.crt (signed by pg-ca.crt) to clients.
    # ssl_ca_file is set so PostgreSQL can optionally verify client certs (future use).
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
      -c ssl_ca_file=/var/lib/postgresql/pg-ca.crt
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    volumes:
      - type: volume
        source: postgres
        target: /var/lib/postgresql/data
      - type: bind
        source: ./init-db.sql
        target: /docker-entrypoint-initdb.d/init-db.sql
      # SSL certificate (public — committed to repo)
      - type: bind
        source: ./postgres/server.crt
        target: /var/lib/postgresql/server.crt
        read_only: true
      # SSL private key (secret — written by deploy.yml from secrets.PG_SSL_KEY; never committed)
      - type: bind
        source: ./postgres/server.key
        target: /var/lib/postgresql/server.key
        read_only: true
      # CA certificate (public — committed to repo; used by clients for verify-full)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /var/lib/postgresql/pg-ca.crt
        read_only: true
    networks:
      - intranet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $PG_USER"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ============================================================
  # Caddy (Reverse Proxy + Automatic HTTPS)
  # ============================================================

  caddy:
    # Custom Caddy image built with mholt/caddy-ratelimit module (SR-CADDY-1).
    # The standard caddy:2-alpine does not include this module.
    # See platform/caddy/Containerfile for build details.
    #
    # ROLLBACK PROCEDURE (SR-CADDY-4 / platform#49):
    # Every build of this image pushes two tags to GHCR:
    #   ghcr.io/olympusoss/caddy:latest            — updated on each build (mutable)
    #   ghcr.io/olympusoss/caddy:sha-<full-sha>    — immutable reference per commit
    #
    # To roll back to a specific build:
    #   1. Identify the SHA of the desired build from the caddy-build.yml workflow run
    #      in GitHub Actions (the sha- tag matches the git commit SHA that triggered it)
    #   2. Pull the specific sha-tagged image:
    #        podman pull ghcr.io/olympusoss/caddy:sha-<full-sha>
    #   3. Update the image: line below to reference the sha-tagged image:
    #        image: ghcr.io/olympusoss/caddy:sha-<full-sha>
    #   4. Redeploy: podman compose -f compose.prod.yml up -d caddy
    #   5. Verify Caddy health and rate limiting are active before closing the incident
    #
    # Only reference Caddy images from successful caddy-build.yml workflow runs
    # (verify job green). Do NOT update this image reference when the workflow
    # is red — the broken image may lack the rate_limit module.
    image: ghcr.io/olympusoss/caddy:latest
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ACME_EMAIL=${SMTP_FROM_EMAIL}
      - SITE_PUBLIC_URL=${SITE_PUBLIC_URL}
      - CIAM_HERA_PUBLIC_URL=${CIAM_HERA_PUBLIC_URL}
      - CIAM_HYDRA_PUBLIC_URL=${CIAM_HYDRA_PUBLIC_URL}
      - CIAM_ATHENA_PUBLIC_URL=${CIAM_ATHENA_PUBLIC_URL}
      - IAM_HERA_PUBLIC_URL=${IAM_HERA_PUBLIC_URL}
      - IAM_HYDRA_PUBLIC_URL=${IAM_HYDRA_PUBLIC_URL}
      - IAM_ATHENA_PUBLIC_URL=${IAM_ATHENA_PUBLIC_URL}
      - PGADMIN_PUBLIC_URL=${PGADMIN_PUBLIC_URL}
    networks:
      - intranet
    restart: unless-stopped

  # ============================================================
  # CIAM Kratos (Customer Identity)
  # ============================================================

  ciam-kratos-migrate:
    image: docker.io/oryd/kratos:v26.2.0
    environment:
      - DSN=${PG_CIAM_KRATOS_DSN}
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./ciam-kratos
        target: /etc/config/ciam-kratos
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    entrypoint: ["sh", "/check-secrets.sh", "ciam-kratos-migrate", "DSN", "--"]
    command: ["kratos", "-c", "/etc/config/ciam-kratos/kratos.yml", "migrate", "sql", "-e", "--yes"]
    networks:
      - intranet
    depends_on:
      postgres:
        condition: service_healthy

  ciam-kratos:
    image: docker.io/oryd/kratos:v26.2.0
    ports:
      - '3100:5000' # public
      - '3101:5001' # admin
    restart: unless-stopped
    environment:
      - DSN=${PG_CIAM_KRATOS_DSN}
      - SERVE_PUBLIC_PORT=5000
      - SERVE_ADMIN_PORT=5001
      - SECRETS_COOKIE=${CIAM_KRATOS_SECRET_COOKIE}
      - SECRETS_CIPHER=${CIAM_KRATOS_SECRET_CIPHER}
      - SERVE_PUBLIC_CORS_ALLOWED_ORIGINS=${CIAM_CORS_ALLOWED_ORIGINS}
      - SELFSERVICE_DEFAULT_BROWSER_RETURN_URL=${CIAM_HERA_PUBLIC_URL}/
      - COURIER_SMTP_CONNECTION_URI=${SMTP_CONNECTION_URI}
      - COURIER_SMTP_FROM_ADDRESS=${SMTP_FROM_EMAIL}
    # Startup shim (platform#9): validates SECRETS_COOKIE, SECRETS_CIPHER, and DSN
    # are non-empty before starting Kratos. Prevents silent startup with empty secrets.
    entrypoint: ["sh", "/check-secrets.sh", "ciam-kratos", "SECRETS_COOKIE", "SECRETS_CIPHER", "DSN", "--"]
    command: ["kratos", "serve", "-c", "/etc/config/ciam-kratos/kratos.yml", "--watch-courier"]
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./ciam-kratos
        target: /etc/config/ciam-kratos
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:5000/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # IAM Kratos (Internal/Employee Identity)
  # ============================================================

  iam-kratos-migrate:
    image: docker.io/oryd/kratos:v26.2.0
    environment:
      - DSN=${PG_IAM_KRATOS_DSN}
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./iam-kratos
        target: /etc/config/iam-kratos
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    entrypoint: ["sh", "/check-secrets.sh", "iam-kratos-migrate", "DSN", "--"]
    command: ["kratos", "-c", "/etc/config/iam-kratos/kratos.yml", "migrate", "sql", "-e", "--yes"]
    networks:
      - intranet
    depends_on:
      postgres:
        condition: service_healthy

  iam-kratos:
    image: docker.io/oryd/kratos:v26.2.0
    ports:
      - '4100:7000' # public
      - '4101:7001' # admin
    restart: unless-stopped
    environment:
      - DSN=${PG_IAM_KRATOS_DSN}
      - SERVE_PUBLIC_PORT=7000
      - SERVE_ADMIN_PORT=7001
      - SECRETS_COOKIE=${IAM_KRATOS_SECRET_COOKIE}
      - SECRETS_CIPHER=${IAM_KRATOS_SECRET_CIPHER}
      - SERVE_PUBLIC_CORS_ALLOWED_ORIGINS=${IAM_CORS_ALLOWED_ORIGINS}
      - SELFSERVICE_DEFAULT_BROWSER_RETURN_URL=${IAM_ATHENA_PUBLIC_URL}/
      - COURIER_SMTP_CONNECTION_URI=${SMTP_CONNECTION_URI}
      - COURIER_SMTP_FROM_ADDRESS=${SMTP_FROM_EMAIL}
    # Startup shim (platform#9): validates SECRETS_COOKIE, SECRETS_CIPHER, and DSN
    # are non-empty before starting Kratos. Prevents silent startup with empty secrets.
    entrypoint: ["sh", "/check-secrets.sh", "iam-kratos", "SECRETS_COOKIE", "SECRETS_CIPHER", "DSN", "--"]
    command: ["kratos", "serve", "-c", "/etc/config/iam-kratos/kratos.yml", "--watch-courier"]
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./iam-kratos
        target: /etc/config/iam-kratos
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:7000/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # CIAM Hydra (Customer OAuth2)
  # ============================================================

  ciam-hydra-migrate:
    image: docker.io/oryd/hydra:v26.2.0
    environment:
      - DSN=${PG_CIAM_HYDRA_DSN}
    entrypoint: ["sh", "/check-secrets.sh", "ciam-hydra-migrate", "DSN", "--"]
    command: ["hydra", "migrate", "-c", "/etc/config/ciam-hydra/hydra.yml", "sql", "up", "-e", "--yes"]
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./ciam-hydra
        target: /etc/config/ciam-hydra
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    depends_on:
      postgres:
        condition: service_healthy

  ciam-hydra:
    image: docker.io/oryd/hydra:v26.2.0
    ports:
      - '3102:5002' # public
      - '3103:5003' # admin
    # Startup shim (platform#9): validates SECRETS_SYSTEM, OIDC pairwise salt, and DSN
    # are non-empty before starting Hydra. Prevents silent startup with empty secrets.
    entrypoint: ["sh", "/check-secrets.sh", "ciam-hydra", "SECRETS_SYSTEM", "OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT", "DSN", "--"]
    command: ["hydra", "serve", "-c", "/etc/config/ciam-hydra/hydra.yml", "all"]
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./ciam-hydra
        target: /etc/config/ciam-hydra
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    environment:
      - DSN=${PG_CIAM_HYDRA_DSN}
      - SERVE_PUBLIC_PORT=5002
      - SERVE_ADMIN_PORT=5003
      - URLS_SELF_ISSUER=${CIAM_HYDRA_PUBLIC_URL}
      - URLS_CONSENT=${CIAM_HERA_PUBLIC_URL}/consent
      - URLS_LOGIN=${CIAM_HERA_PUBLIC_URL}/login
      - URLS_LOGOUT=${CIAM_HERA_PUBLIC_URL}/logout
      - SECRETS_SYSTEM=${CIAM_HYDRA_SECRET_SYSTEM}
      - OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT=${CIAM_HYDRA_PAIRWISE_SALT}
    restart: unless-stopped
    networks:
      - intranet
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:5002/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # IAM Hydra (Internal OAuth2)
  # ============================================================

  iam-hydra-migrate:
    image: docker.io/oryd/hydra:v26.2.0
    environment:
      - DSN=${PG_IAM_HYDRA_DSN}
    entrypoint: ["sh", "/check-secrets.sh", "iam-hydra-migrate", "DSN", "--"]
    command: ["hydra", "migrate", "-c", "/etc/config/iam-hydra/hydra.yml", "sql", "up", "-e", "--yes"]
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./iam-hydra
        target: /etc/config/iam-hydra
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    depends_on:
      postgres:
        condition: service_healthy

  iam-hydra:
    image: docker.io/oryd/hydra:v26.2.0
    ports:
      - '4102:7002' # public
      - '4103:7003' # admin
    environment:
      - DSN=${PG_IAM_HYDRA_DSN}
      - SERVE_PUBLIC_PORT=7002
      - SERVE_ADMIN_PORT=7003
      - URLS_SELF_ISSUER=${IAM_HYDRA_PUBLIC_URL}
      - URLS_CONSENT=${IAM_HERA_PUBLIC_URL}/consent
      - URLS_LOGIN=${IAM_HERA_PUBLIC_URL}/login
      - URLS_LOGOUT=${IAM_HERA_PUBLIC_URL}/logout
      - SECRETS_SYSTEM=${IAM_HYDRA_SECRET_SYSTEM}
      - OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT=${IAM_HYDRA_PAIRWISE_SALT}
    # Startup shim (platform#9): validates SECRETS_SYSTEM, OIDC pairwise salt, and DSN
    # are non-empty before starting Hydra. Prevents silent startup with empty secrets.
    entrypoint: ["sh", "/check-secrets.sh", "iam-hydra", "SECRETS_SYSTEM", "OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT", "DSN", "--"]
    command: ["hydra", "serve", "-c", "/etc/config/iam-hydra/hydra.yml", "all"]
    volumes:
      - type: bind
        source: ./check-secrets.sh
        target: /check-secrets.sh
        read_only: true
      - type: bind
        source: ./iam-hydra
        target: /etc/config/iam-hydra
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    restart: unless-stopped
    networks:
      - intranet
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:7002/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # CIAM Hera (Login/Consent/Logout UI for CIAM)
  # ============================================================

  ciam-hera:
    image: ghcr.io/olympusoss/hera:${HERA_IMAGE_TAG:-latest}
    # No direct host port — accessed via Caddy on {$CIAM_HERA_PUBLIC_URL} (rate-limit enforcement).
    # SECURITY: Do NOT add a ports: binding here. ciam-hera must only be reachable through
    # Caddy on the intranet network. A host port binding bypasses per-IP rate limiting
    # (SR-CADDY-1 / platform#10 Security Condition V1). Deployment policy: CLAUDE.md.
    environment:
      - PORT=3000
      - HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - KRATOS_PUBLIC_URL=http://ciam-kratos:5000
      - KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - DEFAULT_OAUTH2_CLIENT_ID=site-ciam-client
      - HYDRA_PUBLIC_URL=${CIAM_HYDRA_PUBLIC_URL}
      # CAPTCHA POLICY — FAIL-CLOSED (Hera / platform#17)
      # This is a policy-only control. When CAPTCHA_ENABLED=true, TURNSTILE_SITE_KEY (CIAM_CAPTCHA_SITE_KEY)
      # MUST be set correctly. A mismatched or missing key causes Hera login to fail closed — users see
      # a captcha error and cannot log in. Verify CIAM_CAPTCHA_SITE_KEY and CIAM_CAPTCHA_SECRET_KEY match
      # the Turnstile widget configured for this domain before enabling.
      # Defense-in-depth: see platform#22 (per-IP rate limiting via Caddy) — currently GATE HOLD.
      - CAPTCHA_ENABLED=${CIAM_CAPTCHA_ENABLED:-true}
      - CAPTCHA_SITE_KEY=${CIAM_CAPTCHA_SITE_KEY:-}
      - CAPTCHA_SECRET_KEY=${CIAM_CAPTCHA_SECRET_KEY:-}
      - DATABASE_URL=${PG_OLYMPUS_DSN}
      - SETTINGS_TABLE=ciam_settings
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - APP_INSTANCE=CIAM
      - NEXT_PUBLIC_APP_INSTANCE=CIAM
      # SECURITY WARNING — ALLOW_DEMO_ACCOUNTS (platform#17)
      # Setting ALLOW_DEMO_ACCOUNTS=true bypasses CAPTCHA enforcement AND brute-force lockout
      # protections for demo accounts. Both Hera CAPTCHA verification and login rate-limiting are
      # skipped entirely. This MUST remain false in production.
      - ALLOW_DEMO_ACCOUNTS=${ALLOW_DEMO_ACCOUNTS:-false}
    volumes:
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      ciam-hydra:
        condition: service_healthy
      ciam-kratos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # IAM Hera (Login/Consent/Logout UI for IAM)
  # ============================================================

  iam-hera:
    image: ghcr.io/olympusoss/hera:${HERA_IMAGE_TAG:-latest}
    # No direct host port — accessed via Caddy on {$IAM_HERA_PUBLIC_URL}.
    # SECURITY: Do NOT add a ports: binding here. iam-hera must only be reachable through
    # Caddy on the intranet network. A host port binding bypasses the Caddy ingress layer
    # (platform#10 Security Condition V1). Deployment policy: CLAUDE.md.
    environment:
      - PORT=4000
      - HYDRA_ADMIN_URL=http://iam-hydra:7003
      - KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - KRATOS_ADMIN_URL=http://iam-kratos:7001
      - DEFAULT_OAUTH2_CLIENT_ID=athena-iam-client
      - HYDRA_PUBLIC_URL=${IAM_HYDRA_PUBLIC_URL}
      # CAPTCHA POLICY — FAIL-CLOSED (Hera / platform#17)
      # This is a policy-only control. When CAPTCHA_ENABLED=true, TURNSTILE_SITE_KEY (IAM_CAPTCHA_SITE_KEY)
      # MUST be set correctly. A mismatched or missing key causes Hera login to fail closed — users see
      # a captcha error and cannot log in. Verify IAM_CAPTCHA_SITE_KEY and IAM_CAPTCHA_SECRET_KEY match
      # the Turnstile widget configured for this domain before enabling.
      # Defense-in-depth: see platform#22 (per-IP rate limiting via Caddy) — currently GATE HOLD.
      - CAPTCHA_ENABLED=${IAM_CAPTCHA_ENABLED:-true}
      - CAPTCHA_SITE_KEY=${IAM_CAPTCHA_SITE_KEY:-}
      - CAPTCHA_SECRET_KEY=${IAM_CAPTCHA_SECRET_KEY:-}
      - DATABASE_URL=${PG_OLYMPUS_DSN}
      - SETTINGS_TABLE=iam_settings
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - APP_INSTANCE=IAM
      - NEXT_PUBLIC_APP_INSTANCE=IAM
      # SECURITY WARNING — ALLOW_DEMO_ACCOUNTS (platform#17)
      # Setting ALLOW_DEMO_ACCOUNTS=true bypasses CAPTCHA enforcement AND brute-force lockout
      # protections for demo accounts. Both Hera CAPTCHA verification and login rate-limiting are
      # skipped entirely. This MUST remain false in production.
      - ALLOW_DEMO_ACCOUNTS=${ALLOW_DEMO_ACCOUNTS:-false}
    volumes:
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      iam-hydra:
        condition: service_healthy
      iam-kratos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # CIAM Athena (Admin Panel for Customer Identities)
  # ============================================================

  ciam-athena:
    image: ghcr.io/olympusoss/athena:${ATHENA_IMAGE_TAG:-latest}
    # No direct host port — accessed via Caddy on {$CIAM_ATHENA_PUBLIC_URL}.
    # SECURITY: Do NOT add a ports: binding here. ciam-athena must only be reachable through
    # Caddy on the intranet network. A host port binding bypasses the Caddy ingress layer
    # (platform#10 Security Condition V1). Deployment policy: CLAUDE.md.
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_INSTANCE=CIAM
      - APP_INSTANCE=CIAM
      - NEXT_PUBLIC_APP_URL=${CIAM_ATHENA_PUBLIC_URL}
      - KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - KRATOS_PUBLIC_URL=http://ciam-kratos:5000
      - HYDRA_PUBLIC_URL=http://ciam-hydra:5002
      - HYDRA_ADMIN_URL=http://ciam-hydra:5003
      # IAM Kratos (admin authentication via OAuth2)
      - IAM_KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - NEXT_PUBLIC_IAM_HYDRA_PUBLIC_URL=${IAM_HYDRA_PUBLIC_URL}
      - NEXT_PUBLIC_AUTH_HYDRA_URL=${IAM_HYDRA_PUBLIC_URL}
      - AUTH_HYDRA_URL=http://iam-hydra:7002
      - AUTH_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - AUTH_KRATOS_ADMIN_URL=http://iam-kratos:7001
      # CAPTCHA POLICY — DISPLAY-ONLY / FAIL-OPEN (Athena / platform#17)
      # This is a policy-only control. Athena's CAPTCHA is display-only (fail-open): if the
      # Turnstile widget fails to load or the key is misconfigured, Athena continues to function.
      # CAPTCHA_ENABLED=false is the safe default for Athena. See platform#17 for rationale.
      # Defense-in-depth: see platform#22 (per-IP rate limiting via Caddy) — currently GATE HOLD.
      - CAPTCHA_ENABLED=${CIAM_CAPTCHA_ENABLED:-false}
      - CAPTCHA_SITE_KEY=${CIAM_CAPTCHA_SITE_KEY:-}
      - DATABASE_URL=${PG_OLYMPUS_DSN}
      - SETTINGS_TABLE=ciam_settings
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OAUTH_CLIENT_ID=${ATHENA_CIAM_OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${ATHENA_CIAM_OAUTH_CLIENT_SECRET}
      # Stack health checks (own domain only)
      - ATHENA_INTERNAL_URL=http://ciam-athena:3000
      - HERA_INTERNAL_URL=http://ciam-hera:3000
    volumes:
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    depends_on:
      ciam-kratos:
        condition: service_healthy
      iam-kratos:
        condition: service_healthy
      iam-hydra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ============================================================
  # IAM Athena (Admin Panel for Employee Identities)
  # ============================================================

  iam-athena:
    image: ghcr.io/olympusoss/athena:${ATHENA_IMAGE_TAG:-latest}
    # No direct host port — accessed via Caddy on {$IAM_ATHENA_PUBLIC_URL}.
    # SECURITY: Do NOT add a ports: binding here. iam-athena must only be reachable through
    # Caddy on the intranet network. A host port binding bypasses the Caddy ingress layer
    # (platform#10 Security Condition V1). Deployment policy: CLAUDE.md.
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_INSTANCE=IAM
      - APP_INSTANCE=IAM
      - NEXT_PUBLIC_APP_URL=${IAM_ATHENA_PUBLIC_URL}
      - KRATOS_ADMIN_URL=http://iam-kratos:7001
      - KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - HYDRA_ADMIN_URL=http://iam-hydra:7003
      # IAM Kratos (admin authentication via OAuth2)
      - IAM_KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - NEXT_PUBLIC_IAM_HYDRA_PUBLIC_URL=${IAM_HYDRA_PUBLIC_URL}
      - NEXT_PUBLIC_AUTH_HYDRA_URL=${IAM_HYDRA_PUBLIC_URL}
      - AUTH_HYDRA_URL=http://iam-hydra:7002
      - AUTH_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - AUTH_KRATOS_ADMIN_URL=http://iam-kratos:7001
      # CAPTCHA POLICY — DISPLAY-ONLY / FAIL-OPEN (Athena / platform#17)
      # This is a policy-only control. Athena's CAPTCHA is display-only (fail-open): if the
      # Turnstile widget fails to load or the key is misconfigured, Athena continues to function.
      # CAPTCHA_ENABLED=false is the safe default for Athena. See platform#17 for rationale.
      # Defense-in-depth: see platform#22 (per-IP rate limiting via Caddy) — currently GATE HOLD.
      - CAPTCHA_ENABLED=${IAM_CAPTCHA_ENABLED:-false}
      - CAPTCHA_SITE_KEY=${IAM_CAPTCHA_SITE_KEY:-}
      - DATABASE_URL=${PG_OLYMPUS_DSN}
      - SETTINGS_TABLE=iam_settings
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OAUTH_CLIENT_ID=${ATHENA_IAM_OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${ATHENA_IAM_OAUTH_CLIENT_SECRET}
      # Stack health checks (own domain only)
      - ATHENA_INTERNAL_URL=http://iam-athena:3000
      - HERA_INTERNAL_URL=http://iam-hera:4000
    volumes:
      # CA certificate for sslmode=verify-full (platform#53)
      - type: bind
        source: ./postgres/pg-ca.crt
        target: /etc/ssl/certs/pg-ca.crt
        read_only: true
    networks:
      - intranet
    depends_on:
      iam-kratos:
        condition: service_healthy
      iam-hydra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ============================================================
  # Site (Brochure Site & OAuth2 Playground)
  # ============================================================

  site:
    image: ghcr.io/olympusoss/site:${SITE_IMAGE_TAG:-latest}
    ports:
      - '2000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${SITE_PUBLIC_URL}
      - NEXT_PUBLIC_CIAM_HYDRA_URL=${CIAM_HYDRA_PUBLIC_URL}
      - NEXT_PUBLIC_IAM_HYDRA_URL=${IAM_HYDRA_PUBLIC_URL}
      - NEXT_PUBLIC_CIAM_ATHENA_URL=${CIAM_ATHENA_PUBLIC_URL}
      - NEXT_PUBLIC_IAM_ATHENA_URL=${IAM_ATHENA_PUBLIC_URL}
      # Server-side (internal network)
      - CIAM_HYDRA_PUBLIC_URL=http://ciam-hydra:5002
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - CIAM_HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - CIAM_KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - CIAM_CLIENT_ID=${SITE_CIAM_CLIENT_ID}
      - CIAM_CLIENT_SECRET=${SITE_CIAM_CLIENT_SECRET}
      - IAM_CLIENT_ID=${SITE_IAM_CLIENT_ID}
      - IAM_CLIENT_SECRET=${SITE_IAM_CLIENT_SECRET}
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      ciam-hydra:
        condition: service_healthy
      iam-hydra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ============================================================
  # pgAdmin (Database Administration)
  # ============================================================

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    ports:
      - '5433:80'
    environment:
      - PGADMIN_DEFAULT_EMAIL=${ADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=unused
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_OAUTH_CLIENT_ID=${PGADMIN_OAUTH_CLIENT_ID}
      - PGADMIN_OAUTH_CLIENT_SECRET=${PGADMIN_OAUTH_CLIENT_SECRET}
      - IAM_HYDRA_PUBLIC_URL=${IAM_HYDRA_PUBLIC_URL}
      - PGPASSFILE=/pgpass
    volumes:
      - type: bind
        source: ./pgadmin/config_local.py
        target: /pgadmin4/config_local.py
      - type: bind
        source: ./pgadmin-servers.json
        target: /pgadmin4/servers.json
      - type: bind
        source: ./pgadmin/pgpass
        target: /pgpass
    entrypoint: >
      /bin/sh -c "
      cp /pgpass /tmp/pgpass &&
      chmod 0600 /tmp/pgpass &&
      export PGPASSFILE=/tmp/pgpass &&
      exec /entrypoint.sh
      "
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      iam-hydra:
        condition: service_healthy

  # ============================================================
  # Seed (one-shot — run with: podman compose -f compose.prod.yml run --rm seed)
  # ============================================================

  seed:
    image: docker.io/curlimages/curl:latest
    volumes:
      - type: bind
        source: ./seed-prod.sh
        target: /seed-prod.sh
    entrypoint: ["sh", "/seed-prod.sh"]
    environment:
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - CIAM_KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - CIAM_HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CIAM_ATHENA_PUBLIC_URL=${CIAM_ATHENA_PUBLIC_URL}
      - IAM_ATHENA_PUBLIC_URL=${IAM_ATHENA_PUBLIC_URL}
      - ATHENA_CIAM_OAUTH_CLIENT_ID=${ATHENA_CIAM_OAUTH_CLIENT_ID}
      - ATHENA_CIAM_OAUTH_CLIENT_SECRET=${ATHENA_CIAM_OAUTH_CLIENT_SECRET}
      - ATHENA_IAM_OAUTH_CLIENT_ID=${ATHENA_IAM_OAUTH_CLIENT_ID}
      - ATHENA_IAM_OAUTH_CLIENT_SECRET=${ATHENA_IAM_OAUTH_CLIENT_SECRET}
      # Site OAuth2
      - SITE_PUBLIC_URL=${SITE_PUBLIC_URL}
      - SITE_CIAM_CLIENT_ID=${SITE_CIAM_CLIENT_ID}
      - SITE_CIAM_CLIENT_SECRET=${SITE_CIAM_CLIENT_SECRET}
      - SITE_IAM_CLIENT_ID=${SITE_IAM_CLIENT_ID}
      - SITE_IAM_CLIENT_SECRET=${SITE_IAM_CLIENT_SECRET}
      # pgAdmin OAuth2
      - PGADMIN_PUBLIC_URL=${PGADMIN_PUBLIC_URL}
      - PGADMIN_OAUTH_CLIENT_ID=${PGADMIN_OAUTH_CLIENT_ID}
      - PGADMIN_OAUTH_CLIENT_SECRET=${PGADMIN_OAUTH_CLIENT_SECRET}
    networks:
      - intranet
    depends_on:
      ciam-kratos:
        condition: service_healthy
      iam-kratos:
        condition: service_healthy
      ciam-hydra:
        condition: service_healthy
      iam-hydra:
        condition: service_healthy

networks:
  intranet:

volumes:
  postgres:
  caddy_data:
  caddy_config:
