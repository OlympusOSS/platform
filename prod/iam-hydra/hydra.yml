serve:
  cookies:
    same_site_mode: Lax

# urls.self.issuer, urls.consent, urls.login, urls.logout
# are set via environment variables in compose.prod.yml:
#   URLS_SELF_ISSUER, URLS_CONSENT, URLS_LOGIN, URLS_LOGOUT

# secrets.system is set via SECRETS_SYSTEM env var
# oidc.subject_identifiers.pairwise.salt is set via OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT env var

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
  # NOTE (platform#21): A claims_mapper was attempted here to inject IAM Kratos
  # identity traits into ID tokens for pgAdmin DBA role gate enforcement.
  # The 'claims_mapper' property under 'oidc' is NOT valid in Hydra v26.2.0
  # ("additionalProperties 'claims_mapper' not allowed") and has been removed.
  # The Platform Engineer must re-implement role injection using a supported
  # Hydra v26.2.0 mechanism (e.g., claims_mappers via token hooks if available,
  # or an alternative approach). See pgadmin-claims-mapper.jsonnet for reference.
