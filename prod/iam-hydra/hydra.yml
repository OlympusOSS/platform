serve:
  cookies:
    same_site_mode: Lax

# urls.self.issuer, urls.consent, urls.login, urls.logout
# are set via environment variables in compose.prod.yml:
#   URLS_SELF_ISSUER, URLS_CONSENT, URLS_LOGIN, URLS_LOGOUT

# secrets.system is set via SECRETS_SYSTEM env var
# oidc.subject_identifiers.pairwise.salt is set via OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT env var

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
  # Claims mapper (platform#21): injects IAM Kratos identity traits into ID tokens.
  # The mapper adds the 'roles' array claim required by pgAdmin's
  # OAUTH2_ADDITIONAL_CLAIMS_VALIDATION hook to enforce 'dba' role access control.
  # Uses null-safe std.get() to handle identities without a 'roles' trait.
  claims_mapper:
    filepath: /etc/config/iam-hydra/pgadmin-claims-mapper.jsonnet
