serve:
  cookies:
    same_site_mode: Lax

# urls.self.issuer, urls.consent, urls.login, urls.logout
# are set via environment variables in compose.prod.yml:
#   URLS_SELF_ISSUER, URLS_CONSENT, URLS_LOGIN, URLS_LOGOUT

# secrets.system is set via SECRETS_SYSTEM env var
# oidc.subject_identifiers.pairwise.salt is set via OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT env var

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
  # Note (platform#21): Hydra v26.2.0 does not support oidc.claims_mapper.
  # The 'roles' claim for the pgAdmin DBA role gate is injected via the consent
  # session instead: the IAM login action fetches the identity's 'roles' trait
  # and passes it through the Hydra login context; the consent page reads it
  # and sets session.id_token.roles in AcceptConsentRequest.
  # See hera/src/app/login/actions.ts and hera/src/app/consent/page.tsx.
