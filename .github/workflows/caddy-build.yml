name: Build and push custom Caddy image

# Builds the custom Caddy image (with mholt/caddy-ratelimit module) and
# publishes it to ghcr.io/olympusoss/caddy:latest and a sha-<short> tag.
#
# Required: SR-CADDY-1 (platform#22) — standard caddy:2-alpine does not include
# the caddy-ratelimit module needed for per-IP rate limiting on CIAM login routes.
#
# The sha-<short> tag provides a stable rollback reference for every build
# (SR-CADDY-4 / platform#49). The `latest` tag is the production reference.
#
# After push, a verify job confirms the built image contains the
# http.handlers.rate_limit module (SR-CADDY-3 / platform#48). If the module
# is absent, the workflow fails and the broken image is flagged before deployment.
#
# Triggers:
#   - Push to main that modifies caddy/Containerfile (rebuilds when the image changes)
#   - Manual workflow_dispatch (force rebuild / rotate)

on:
  push:
    branches:
      - main
    paths:
      - 'caddy/Containerfile'
  workflow_dispatch:

concurrency:
  group: caddy-build
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./caddy
          file: ./caddy/Containerfile
          push: true
          tags: |
            ghcr.io/olympusoss/caddy:latest
            ghcr.io/olympusoss/caddy:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify rate_limit module present
        # SMOKE TEST SCOPE (SR-CADDY-3 / platform#48):
        # This check confirms that the http.handlers.rate_limit module binary is
        # present in the built image by running `caddy list-modules` inside the
        # container. It is a BUILD-TIME MODULE PRESENCE CHECK ONLY.
        #
        # What this check does NOT verify:
        #   - Caddyfile parse correctness (a malformed config would fail at runtime)
        #   - Module initialization (the module binary may be present but crash on
        #     first request if incompatible with the Caddyfile directives)
        #   - Runtime rate limiting behavior (whether the zone config is correct)
        #
        # A green verify job means: the binary was compiled into the image.
        # Full runtime verification occurs via deployment health checks and QA.
        # QA must NOT issue a PASS verdict on rate limiting based solely on this
        # workflow succeeding — runtime validation requires a live environment.
        #
        # No automated pull of caddy:latest from GHCR exists in this infrastructure.
        # compose.prod.yml is updated manually by operators after a green workflow run.
        # A failed verify job marks the workflow as failed — do not update compose.prod.yml
        # to reference a new Caddy image until this workflow shows green.
        run: |
          docker run --rm ghcr.io/olympusoss/caddy:latest caddy list-modules \
            | grep -q "http.handlers.rate_limit" \
            || (echo "ERROR: http.handlers.rate_limit module not found in built image — rate limiting will be inactive in production" && exit 1)
          echo "OK: http.handlers.rate_limit confirmed present in ghcr.io/olympusoss/caddy:latest"
