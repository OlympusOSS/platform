name: Verify production config has no sensitive value leaks

# Three regression gates for production Ory (Kratos + Hydra) configs.
# Gates 1-2 grep only platform/prod/ — dev configs intentionally contain
# placeholder and debug values and are excluded from these checks.
# Gate 3 uses gitleaks to scan the full prod/ tree for broad secret patterns.
#
# Gate 1 — leak_sensitive_values (platform#25):
#   Asserts that leak_sensitive_values: true is never present in production
#   Kratos configs. When true, Kratos logs plaintext TOTP secrets, session
#   tokens, and credentials into any log aggregation system.
#
#   Grep pattern: leak_sensitive_values:\s*true
#   Handles YAML spacing variants. Does NOT false-positive on false or absent.
#
#   String-boolean note (Go yaml.v3):
#   Ory Kratos is built with Go's yaml.v3. That parser does NOT coerce a
#   quoted string "true" to boolean true — it treats it as a string type,
#   which Kratos would not interpret as the boolean flag. The unquoted form
#   (leak_sensitive_values: true) is the only form that activates the flag,
#   and is the only form this regex needs to catch. The quoted-string bypass
#   is inert. This closes the DA open question from the Architecture Review.
#
# Gate 2 — placeholder/insecure secret strings (platform#9):
#   Asserts that known dev-placeholder and insecure-default strings are absent
#   from all production Kratos and Hydra YAML configs. These strings indicate
#   that a secret field was not replaced with a real value before deploying.
#
#   Patterns checked (case-insensitive):
#     PLEASE-CHANGE-ME  — Ory default placeholder in generated configs
#     change-me         — common dev placeholder variant
#     insecure          — Ory and community convention for "not safe for prod"
#
#   Scope: prod/ciam-kratos/, prod/iam-kratos/, prod/ciam-hydra/, prod/iam-hydra/
#   Only YAML files are checked to avoid false positives on JSON schemas or
#   jsonnet files that may legitimately contain these strings as field names
#   or example values.
#
# Gate 3 — gitleaks secrets scanner (platform#9 / Security V2):
#   Runs gitleaks against the full prod/ directory tree to detect a broad
#   class of secrets: API keys, tokens, passwords, private keys, etc.
#   This catches patterns that the narrower grep in Gate 2 does not —
#   e.g. "secret123", short fixed strings, AWS keys, private keys.
#   Ownership: this workflow (platform#9) owns gitleaks configuration.
#   The .gitleaks.toml config file lives in the repo root.
#
# Gate 4 — private key files in tracked git files (platform#53):
#   Asserts that no .key files are committed under prod/postgres/ or prod/.
#   .gitignore is a soft control that can be bypassed with --force.
#   This CI check is the hard gate that catches accidental commits.
#
# Gate 5 — sslmode regression check (platform#53):
#   Asserts that compose.prod.yml does not contain sslmode=require,
#   sslmode=disable, sslmode=prefer, or sslmode=allow. All production
#   DSNs must use sslmode=verify-full. Scoped to prod/ only — dev
#   uses sslmode=disable intentionally.
#
# Gate 6 — certificate file modification detection (platform#78):
#   Blocks PRs that modify committed certificate files (.crt, .pem) under
#   prod/postgres/ unless the PR carries the 'human-cert-rotation' label.
#   Only human operators (Team Lead/Daedalus) may rotate certificates.
#
# Gate 7 — openssl key/cert generation detection (platform#78):
#   Scans prod/, scripts/, and *.sh for openssl commands that generate
#   cryptographic material (genrsa, genpkey, req -new, req -x509, etc.).
#   Agents must NEVER generate certificates or keys.
#
# Gate model:
#   Push-to-main is the authoritative gate — it always runs on the final
#   merged state. The pull_request trigger is fast feedback during review;
#   it fires on all PRs regardless of path, matching the grep's own scope.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify-prod-config:
    name: Check production Kratos/Hydra configs for insecure values
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for leak_sensitive_values in production configs
        run: |
          if grep -rE 'leak_sensitive_values:\s*true' prod/; then
            echo ""
            echo "ERROR: leak_sensitive_values: true found in a production Kratos config."
            echo "This setting causes Kratos to log plaintext TOTP secrets, session tokens,"
            echo "and credentials into any log aggregation system. It MUST NOT be true in"
            echo "production. Set it to false or remove it (Kratos defaults to false)."
            exit 1
          fi
          echo "OK: leak_sensitive_values check passed — no production config has this set to true."

      - name: Check for placeholder/insecure secret strings in production configs
        run: |
          # Only scan YAML files in the four Ory service config directories.
          # JSON schemas and jsonnet files are excluded — they may legitimately
          # reference these strings as documentation or example values.
          FOUND=$(grep -rniE 'PLEASE-CHANGE-ME|change-me|insecure' \
            prod/ciam-kratos/ prod/iam-kratos/ prod/ciam-hydra/ prod/iam-hydra/ \
            --include='*.yml' || true)
          if [ -n "$FOUND" ]; then
            echo ""
            echo "ERROR: placeholder or insecure secret string found in a production Ory config."
            echo ""
            echo "$FOUND"
            echo ""
            echo "Strings 'PLEASE-CHANGE-ME', 'change-me', and 'insecure' are dev placeholders."
            echo "Every secret field in production configs must reference an environment variable"
            echo "substitution (e.g. \$SECRETS_COOKIE) — never a hardcoded or placeholder value."
            exit 1
          fi
          echo "OK: no placeholder or insecure secret strings found in production Ory configs."

      - name: Check for private key files in tracked files (platform#53)
        run: |
          # Gate 4: .key files must never be committed. .gitignore blocks them,
          # but this is a soft control. This CI check is the hard gate.
          # Scoped to platform/prod/ to avoid false positives on dev configs.
          FOUND=$(git ls-files 'prod/postgres/*.key' 'prod/*.key' || true)
          if [ -n "$FOUND" ]; then
            echo ""
            echo "ERROR: Private key file(s) found in tracked git files:"
            echo "$FOUND"
            echo ""
            echo "Private keys (server.key, pg-ca.key) must NEVER be committed."
            echo "Remove with: git rm --cached <file> && git commit"
            echo "Store keys in GitHub Secrets (PG_SSL_KEY, PG_CA_KEY)."
            exit 1
          fi
          echo "OK: no private key files in tracked git files."

      - name: Check sslmode is verify-full in prod compose (platform#53)
        run: |
          # Gate 5: Detect sslmode regressions in compose.prod.yml.
          # Any DSN reference that uses sslmode= but NOT verify-full is a regression.
          # Scoped to platform/prod/ only — dev uses sslmode=disable intentionally.
          FOUND=$(grep -nE 'sslmode=(require|disable|prefer|allow)' prod/compose.prod.yml || true)
          if [ -n "$FOUND" ]; then
            echo ""
            echo "ERROR: sslmode regression detected in prod/compose.prod.yml:"
            echo "$FOUND"
            echo ""
            echo "All production DSNs must use sslmode=verify-full (platform#53)."
            echo "sslmode=require does not validate the server certificate (MITM risk)."
            exit 1
          fi
          echo "OK: no sslmode regression detected in production compose."

      - name: "Gate 6: Certificate file modification detection (platform#78)"
        if: "!contains(github.event.pull_request.labels.*.name, 'human-cert-rotation')"
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_BASE="${{ github.event.pull_request.base.sha }}"
            DIFF_HEAD="${{ github.event.pull_request.head.sha }}"
          else
            DIFF_BASE="HEAD~1"
            DIFF_HEAD="HEAD"
          fi
          MODIFIED_CERTS=$(git diff --name-only "$DIFF_BASE" "$DIFF_HEAD" -- \
            'prod/postgres/*.crt' 'prod/postgres/*.pem' 2>/dev/null || true)
          if [ -n "$MODIFIED_CERTS" ]; then
            echo "::error::Certificate files modified: $MODIFIED_CERTS"
            echo "Certificate files must NOT be modified by agents. Only human operators"
            echo "(Team Lead/Daedalus) can modify certs and update the matching GitHub Secret."
            echo "Add 'human-cert-rotation' label to bypass. Reference: platform#53, platform#78"
            exit 1
          fi
          echo "Gate 6 PASS: no certificate files modified."

      - name: "Gate 7: openssl key/cert generation detection (platform#78)"
        run: |
          FOUND=$(grep -rnE 'openssl\s+(genrsa|genpkey|req\s+-new|req\s+-x509|ca\s+-|x509\s+-req|pkcs12|ecparam\s+-genkey)' \
            prod/ scripts/ *.sh 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "::error::openssl key/cert generation command found: $FOUND"
            echo "Agents must NEVER generate cryptographic material."
            echo "Reference: platform#53, platform#78"
            exit 1
          fi
          echo "Gate 7 PASS: no openssl generation commands."

      - name: Run gitleaks secrets scan on prod/ directory
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source prod/ --no-git --config .gitleaks.toml --verbose
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
