name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        default: 'production'
        options:
          - production

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_OPTS: -i ~/.ssh/deploy_key -p ${{ vars.DEPLOY_SSH_PORT || 22 }} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=30
      SSH_TARGET: ${{ vars.DEPLOY_USER || 'root' }}@${{ vars.DEPLOY_SERVER_IP }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/olympusoss/prod' }}
      COMPOSE: podman compose -f compose.prod.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -p ${{ vars.DEPLOY_SSH_PORT || 22 }} ${{ vars.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure deploy directory exists
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}"

      - name: Sync configs to server
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '.env.example' \
            -e "ssh ${{ env.SSH_OPTS }}" \
            ./prod/ ${{ env.SSH_TARGET }}:${{ env.DEPLOY_PATH }}/

      - name: Generate .env
        run: |
          cat > /tmp/.env.deploy <<'ENVEOF'
          # Auto-generated by GitHub Actions — do not edit manually.
          COMPOSE_FILE=compose.prod.yml

          # Domain URLs
          CIAM_HERA_PUBLIC_URL=${{ vars.CIAM_HERA_PUBLIC_URL }}
          IAM_HERA_PUBLIC_URL=${{ vars.IAM_HERA_PUBLIC_URL }}
          CIAM_HYDRA_PUBLIC_URL=${{ vars.CIAM_HYDRA_PUBLIC_URL }}
          IAM_HYDRA_PUBLIC_URL=${{ vars.IAM_HYDRA_PUBLIC_URL }}
          CIAM_ATHENA_PUBLIC_URL=${{ vars.CIAM_ATHENA_PUBLIC_URL }}
          IAM_ATHENA_PUBLIC_URL=${{ vars.IAM_ATHENA_PUBLIC_URL }}
          SITE_PUBLIC_URL=${{ vars.SITE_PUBLIC_URL }}
          PGADMIN_PUBLIC_URL=${{ vars.PGADMIN_PUBLIC_URL }}

          # Neon PostgreSQL (managed)
          NEON_CIAM_KRATOS_DSN=${{ secrets.NEON_CIAM_KRATOS_DSN }}
          NEON_CIAM_HYDRA_DSN=${{ secrets.NEON_CIAM_HYDRA_DSN }}
          NEON_IAM_KRATOS_DSN=${{ secrets.NEON_IAM_KRATOS_DSN }}
          NEON_IAM_HYDRA_DSN=${{ secrets.NEON_IAM_HYDRA_DSN }}
          NEON_OLYMPUS_DSN=${{ secrets.NEON_OLYMPUS_DSN }}

          # Application settings encryption
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}

          # CIAM Kratos
          CIAM_KRATOS_SECRET_COOKIE=${{ secrets.CIAM_KRATOS_SECRET_COOKIE }}
          CIAM_KRATOS_SECRET_CIPHER=${{ secrets.CIAM_KRATOS_SECRET_CIPHER }}

          # IAM Kratos
          IAM_KRATOS_SECRET_COOKIE=${{ secrets.IAM_KRATOS_SECRET_COOKIE }}
          IAM_KRATOS_SECRET_CIPHER=${{ secrets.IAM_KRATOS_SECRET_CIPHER }}

          # CIAM Hydra
          CIAM_HYDRA_SECRET_SYSTEM=${{ secrets.CIAM_HYDRA_SECRET_SYSTEM }}
          CIAM_HYDRA_PAIRWISE_SALT=${{ secrets.CIAM_HYDRA_PAIRWISE_SALT }}

          # IAM Hydra
          IAM_HYDRA_SECRET_SYSTEM=${{ secrets.IAM_HYDRA_SECRET_SYSTEM }}
          IAM_HYDRA_PAIRWISE_SALT=${{ secrets.IAM_HYDRA_PAIRWISE_SALT }}

          # CORS
          CIAM_CORS_ALLOWED_ORIGINS=${{ vars.CIAM_HERA_PUBLIC_URL }},${{ vars.CIAM_ATHENA_PUBLIC_URL }}
          IAM_CORS_ALLOWED_ORIGINS=${{ vars.IAM_HERA_PUBLIC_URL }},${{ vars.IAM_ATHENA_PUBLIC_URL }}

          # SMTP (Resend)
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          SMTP_FROM_EMAIL=${{ vars.SMTP_FROM_EMAIL }}
          SMTP_CONNECTION_URI=smtps://resend:${{ secrets.RESEND_API_KEY }}@smtp.resend.com:465/

          # OAuth2 — CIAM Athena
          ATHENA_CIAM_OAUTH_CLIENT_ID=${{ vars.ATHENA_CIAM_OAUTH_CLIENT_ID || 'athena-ciam-client' }}
          ATHENA_CIAM_OAUTH_CLIENT_SECRET=${{ secrets.ATHENA_CIAM_OAUTH_CLIENT_SECRET }}

          # OAuth2 — IAM Athena
          ATHENA_IAM_OAUTH_CLIENT_ID=${{ vars.ATHENA_IAM_OAUTH_CLIENT_ID || 'athena-iam-client' }}
          ATHENA_IAM_OAUTH_CLIENT_SECRET=${{ secrets.ATHENA_IAM_OAUTH_CLIENT_SECRET }}

          # OAuth2 — Site
          SITE_CIAM_CLIENT_ID=${{ vars.SITE_CIAM_CLIENT_ID || 'site-ciam-client' }}
          SITE_CIAM_CLIENT_SECRET=${{ secrets.SITE_CIAM_CLIENT_SECRET }}
          SITE_IAM_CLIENT_ID=${{ vars.SITE_IAM_CLIENT_ID || 'site-iam-client' }}
          SITE_IAM_CLIENT_SECRET=${{ secrets.SITE_IAM_CLIENT_SECRET }}

          # OAuth2 — pgAdmin
          PGADMIN_OAUTH_CLIENT_ID=${{ vars.PGADMIN_OAUTH_CLIENT_ID || 'pgadmin' }}
          PGADMIN_OAUTH_CLIENT_SECRET=${{ secrets.PGADMIN_OAUTH_CLIENT_SECRET }}

          # CAPTCHA (Cloudflare Turnstile) — per domain
          CIAM_CAPTCHA_ENABLED=${{ vars.CIAM_CAPTCHA_ENABLED || 'false' }}
          CIAM_CAPTCHA_SITE_KEY=${{ vars.CIAM_CAPTCHA_SITE_KEY }}
          CIAM_CAPTCHA_SECRET_KEY=${{ secrets.CIAM_CAPTCHA_SECRET_KEY }}
          IAM_CAPTCHA_ENABLED=${{ vars.IAM_CAPTCHA_ENABLED || 'false' }}
          IAM_CAPTCHA_SITE_KEY=${{ vars.IAM_CAPTCHA_SITE_KEY }}
          IAM_CAPTCHA_SECRET_KEY=${{ secrets.IAM_CAPTCHA_SECRET_KEY }}

          # Image tags (used by app CD pipelines, not this workflow)
          HERA_IMAGE_TAG=${{ vars.HERA_IMAGE_TAG || 'latest' }}
          ATHENA_IMAGE_TAG=${{ vars.ATHENA_IMAGE_TAG || 'latest' }}
          SITE_IMAGE_TAG=${{ vars.SITE_IMAGE_TAG || 'latest' }}

          # Admin identity (used by seed)
          ADMIN_EMAIL=${{ vars.ADMIN_EMAIL || 'admin@example.com' }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ENVEOF
          # Strip leading whitespace from heredoc (YAML indentation artifact)
          sed -i 's/^[[:space:]]*//' /tmp/.env.deploy
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} "cat > ${{ env.DEPLOY_PATH }}/.env" < /tmp/.env.deploy
          rm -f /tmp/.env.deploy

      - name: Login to GHCR on server
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "echo '${{ secrets.GHCR_PAT }}' | podman login ghcr.io -u ${{ vars.GHCR_USERNAME }} --password-stdin"

      - name: Run Ory schema migrations
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ${{ env.COMPOSE }} run --rm ciam-kratos-migrate && \
             ${{ env.COMPOSE }} run --rm iam-kratos-migrate && \
             ${{ env.COMPOSE }} run --rm ciam-hydra-migrate && \
             ${{ env.COMPOSE }} run --rm iam-hydra-migrate"

      - name: Deploy infrastructure services
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ${{ env.COMPOSE }} up -d \
               caddy \
               ciam-kratos iam-kratos \
               ciam-hydra iam-hydra \
               pgadmin"

      - name: Seed (idempotent)
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ${{ env.COMPOSE }} run --rm seed"

      - name: Wait for services to be healthy
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             echo 'Waiting for services to stabilize...' && \
             sleep 15 && \
             ${{ env.COMPOSE }} ps --format 'table {{.Name}}\t{{.Status}}'"

      - name: Health check summary
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             echo '=== Service Health ===' && \
             ${{ env.COMPOSE }} ps --format 'table {{.Name}}\t{{.Status}}\t{{.Ports}}'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
