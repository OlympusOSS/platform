name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        default: 'production'
        options:
          - production

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_OPTS: -i ~/.ssh/deploy_key -p ${{ vars.DEPLOY_SSH_PORT || 22 }} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=30
      SSH_TARGET: ${{ vars.DEPLOY_USER || 'root' }}@${{ vars.DEPLOY_SERVER_IP }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/olympusoss/prod' }}
      COMPOSE: podman compose -f compose.prod.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -p ${{ vars.DEPLOY_SSH_PORT || 22 }} ${{ vars.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure deploy directory exists
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}"

      - name: Sync configs to server
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '.env.example' \
            --exclude 'pgadmin/pgpass' \
            -e "ssh ${{ env.SSH_OPTS }}" \
            ./prod/ ${{ env.SSH_TARGET }}:${{ env.DEPLOY_PATH }}/

      - name: Generate .env and pgpass
        run: |
          # Parse user and password from PG_DSN_BASE (format: postgres://user:pass@host:port)
          PG_DSN_BASE="${{ secrets.PG_DSN_BASE }}"
          PG_USER=$(echo "$PG_DSN_BASE" | sed -n 's|.*://\([^:]*\):.*|\1|p')
          PG_PASSWORD=$(echo "$PG_DSN_BASE" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p')

          cat > /tmp/.env.deploy <<'ENVEOF'
          # Auto-generated by GitHub Actions — do not edit manually.
          COMPOSE_FILE=compose.prod.yml

          # Domain — all service URLs derived from this variable + optional subdomain overrides
          DOMAIN=${{ vars.DOMAIN }}
          CIAM_HERA_PUBLIC_URL=https://${{ vars.CIAM_LOGIN_SUBDOMAIN || 'login.ciam' }}.${{ vars.DOMAIN }}
          IAM_HERA_PUBLIC_URL=https://${{ vars.IAM_LOGIN_SUBDOMAIN || 'login.iam' }}.${{ vars.DOMAIN }}
          CIAM_HYDRA_PUBLIC_URL=https://${{ vars.CIAM_OAUTH_SUBDOMAIN || 'oauth.ciam' }}.${{ vars.DOMAIN }}
          IAM_HYDRA_PUBLIC_URL=https://${{ vars.IAM_OAUTH_SUBDOMAIN || 'oauth.iam' }}.${{ vars.DOMAIN }}
          CIAM_ATHENA_PUBLIC_URL=https://${{ vars.CIAM_ADMIN_SUBDOMAIN || 'admin.ciam' }}.${{ vars.DOMAIN }}
          IAM_ATHENA_PUBLIC_URL=https://${{ vars.IAM_ADMIN_SUBDOMAIN || 'admin.iam' }}.${{ vars.DOMAIN }}
          SITE_PUBLIC_URL=https://${{ vars.SITE_SUBDOMAIN || 'olympus' }}.${{ vars.DOMAIN }}
          PGADMIN_PUBLIC_URL=https://${{ vars.PGADMIN_SUBDOMAIN || 'pgadmin' }}.${{ vars.DOMAIN }}

          # PostgreSQL — container credentials (parsed from PG_DSN_BASE)
          PG_USER=${PG_USER}
          PG_PASSWORD=${PG_PASSWORD}

          # PostgreSQL — per-service DSNs derived from single base DSN
          # sslmode=verify-full (platform#53): clients verify server cert is signed by
          # the CA and hostname matches CN=postgres. sslrootcert points to the CA cert
          # mounted from ./postgres/pg-ca.crt into /etc/ssl/certs/pg-ca.crt in each container.
          PG_CIAM_KRATOS_DSN=${{ secrets.PG_DSN_BASE }}/ciam_kratos?sslmode=verify-full&sslrootcert=/etc/ssl/certs/pg-ca.crt
          PG_CIAM_HYDRA_DSN=${{ secrets.PG_DSN_BASE }}/ciam_hydra?sslmode=verify-full&sslrootcert=/etc/ssl/certs/pg-ca.crt
          PG_IAM_KRATOS_DSN=${{ secrets.PG_DSN_BASE }}/iam_kratos?sslmode=verify-full&sslrootcert=/etc/ssl/certs/pg-ca.crt
          PG_IAM_HYDRA_DSN=${{ secrets.PG_DSN_BASE }}/iam_hydra?sslmode=verify-full&sslrootcert=/etc/ssl/certs/pg-ca.crt
          PG_OLYMPUS_DSN=${{ secrets.PG_DSN_BASE }}/olympus?sslmode=verify-full&sslrootcert=/etc/ssl/certs/pg-ca.crt

          # Application settings encryption
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}

          # CIAM Kratos
          CIAM_KRATOS_SECRET_COOKIE=${{ secrets.CIAM_KRATOS_SECRET_COOKIE }}
          CIAM_KRATOS_SECRET_CIPHER=${{ secrets.CIAM_KRATOS_SECRET_CIPHER }}

          # IAM Kratos
          IAM_KRATOS_SECRET_COOKIE=${{ secrets.IAM_KRATOS_SECRET_COOKIE }}
          IAM_KRATOS_SECRET_CIPHER=${{ secrets.IAM_KRATOS_SECRET_CIPHER }}

          # CIAM Hydra
          CIAM_HYDRA_SECRET_SYSTEM=${{ secrets.CIAM_HYDRA_SECRET_SYSTEM }}
          CIAM_HYDRA_PAIRWISE_SALT=${{ secrets.CIAM_HYDRA_PAIRWISE_SALT }}

          # IAM Hydra
          IAM_HYDRA_SECRET_SYSTEM=${{ secrets.IAM_HYDRA_SECRET_SYSTEM }}
          IAM_HYDRA_PAIRWISE_SALT=${{ secrets.IAM_HYDRA_PAIRWISE_SALT }}

          # CORS
          CIAM_CORS_ALLOWED_ORIGINS=https://${{ vars.CIAM_LOGIN_SUBDOMAIN || 'login.ciam' }}.${{ vars.DOMAIN }},https://${{ vars.CIAM_ADMIN_SUBDOMAIN || 'admin.ciam' }}.${{ vars.DOMAIN }}
          IAM_CORS_ALLOWED_ORIGINS=https://${{ vars.IAM_LOGIN_SUBDOMAIN || 'login.iam' }}.${{ vars.DOMAIN }},https://${{ vars.IAM_ADMIN_SUBDOMAIN || 'admin.iam' }}.${{ vars.DOMAIN }}

          # SMTP
          SMTP_FROM_EMAIL=noreply@${{ vars.DOMAIN }}
          SMTP_CONNECTION_URI=${{ secrets.SMTP_CONNECTION_URI }}

          # OAuth2 — Athena (client IDs hardcoded; secrets for seed only, Athena reads from vault)
          ATHENA_CIAM_OAUTH_CLIENT_ID=athena-ciam-client
          ATHENA_CIAM_OAUTH_CLIENT_SECRET=${{ secrets.ATHENA_CIAM_OAUTH_CLIENT_SECRET }}
          ATHENA_IAM_OAUTH_CLIENT_ID=athena-iam-client
          ATHENA_IAM_OAUTH_CLIENT_SECRET=${{ secrets.ATHENA_IAM_OAUTH_CLIENT_SECRET }}

          # OAuth2 — Site
          SITE_CIAM_CLIENT_ID=site-ciam-client
          SITE_CIAM_CLIENT_SECRET=${{ secrets.SITE_CIAM_CLIENT_SECRET }}
          SITE_IAM_CLIENT_ID=site-iam-client
          SITE_IAM_CLIENT_SECRET=${{ secrets.SITE_IAM_CLIENT_SECRET }}

          # OAuth2 — pgAdmin
          PGADMIN_OAUTH_CLIENT_ID=pgadmin
          PGADMIN_OAUTH_CLIENT_SECRET=${{ secrets.PGADMIN_OAUTH_CLIENT_SECRET }}

          # Image tags
          HERA_IMAGE_TAG=${{ vars.HERA_IMAGE_TAG || 'latest' }}
          ATHENA_IMAGE_TAG=${{ vars.ATHENA_IMAGE_TAG || 'latest' }}
          SITE_IMAGE_TAG=${{ vars.SITE_IMAGE_TAG || 'latest' }}

          # Feature flags
          ALLOW_DEMO_ACCOUNTS=${{ vars.ALLOW_DEMO_ACCOUNTS || 'false' }}

          # Admin identity (used by seed)
          ADMIN_EMAIL=admin@example.com
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ENVEOF
          # Strip leading whitespace from heredoc (YAML indentation artifact)
          sed -i 's/^[[:space:]]*//' /tmp/.env.deploy
          # Substitute shell variables (PG_USER, PG_PASSWORD) that couldn't be inlined in the heredoc
          sed -i "s|\${PG_USER}|${PG_USER}|g; s|\${PG_PASSWORD}|${PG_PASSWORD}|g" /tmp/.env.deploy
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} "cat > ${{ env.DEPLOY_PATH }}/.env" < /tmp/.env.deploy
          rm -f /tmp/.env.deploy

          # Generate pgpass for pgAdmin (format: hostname:port:database:username:password)
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}/pgadmin && echo 'postgres:5432:*:${PG_USER}:${PG_PASSWORD}' > ${{ env.DEPLOY_PATH }}/pgadmin/pgpass"

      # ---------------------------------------------------------------
      # SECURITY: Deploy-time assertion for DSN sslmode (platform#53).
      # Verifies all 5 DSN strings contain sslmode=verify-full.
      # Catches silent regressions from PG_SSLMODE variable overrides
      # or .env template mistakes.
      # ---------------------------------------------------------------
      - name: Verify DSN sslmode=verify-full (platform#53)
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "echo '=== DSN sslmode assertion (platform#53) ===' && \
             FAILED=0 && \
             for DSN_VAR in PG_CIAM_KRATOS_DSN PG_CIAM_HYDRA_DSN PG_IAM_KRATOS_DSN PG_IAM_HYDRA_DSN PG_OLYMPUS_DSN; do \
               DSN_VALUE=\$(grep \"^\${DSN_VAR}=\" ${{ env.DEPLOY_PATH }}/.env | cut -d= -f2-); \
               if echo \"\$DSN_VALUE\" | grep -q 'sslmode=verify-full'; then \
                 echo \"  PASS: \$DSN_VAR contains sslmode=verify-full\"; \
               else \
                 echo \"  FAIL: \$DSN_VAR does not contain sslmode=verify-full\"; \
                 FAILED=1; \
               fi; \
             done && \
             if [ \$FAILED -eq 1 ]; then \
               echo '' && \
               echo 'FATAL: One or more DSNs do not use sslmode=verify-full.' && \
               echo 'This is a security regression — MITM protection requires verify-full.' && \
               echo 'Check deploy.yml DSN template and remove any PG_SSLMODE variable override.' && \
               exit 1; \
             fi && \
             echo 'All 5 DSNs use sslmode=verify-full.'"

      - name: Login to GHCR on server
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "echo '${{ secrets.GHCR_PAT }}' | podman login ghcr.io -u ${{ vars.GHCR_USERNAME }} --password-stdin"

      # ---------------------------------------------------------------
      # SECURITY: Write PostgreSQL SSL private key BEFORE starting
      # PostgreSQL. This step MUST precede "Start PostgreSQL" — if the
      # key file is missing when the container starts, PostgreSQL will
      # fail immediately with "could not load private SSL key".
      #
      # Pre-flight checklist (must be done before triggering this
      # workflow — cannot be automated here):
      #
      #   [C4] Delete or update the PG_SSLMODE GitHub Variable:
      #        Go to: Settings > Secrets and variables > Actions > Variables
      #        Either delete PG_SSLMODE (new 'require' default takes effect)
      #        or set PG_SSLMODE=require explicitly.
      #        WARNING: If PG_SSLMODE=disable is still set as a Variable,
      #        it overrides the 'require' default in this workflow and
      #        plaintext connections will continue post-deployment.
      #
      #   [PG_SSL_KEY] Add secrets.PG_SSL_KEY to GitHub Secrets:
      #        Go to: Settings > Secrets and variables > Actions > Secrets
      #        Paste the contents of platform/prod/postgres/server.key
      #        (the private key file — do NOT commit server.key to the repo).
      # ---------------------------------------------------------------
      - name: Validate PG_SSL_KEY secret is set
        run: |
          # Guard: PG_SSL_KEY must be non-empty. If absent, server.key is written as 0 bytes
          # and PostgreSQL fails with "could not load private SSL key", blocking all downstream
          # services (kratos migrate sql, hydra migrate sql, seed, app deploy).
          # Root cause of platform#74 — 3 consecutive deploy failures on 2026-04-08.
          if [ -z "${{ secrets.PG_SSL_KEY }}" ]; then
            echo "FATAL: PG_SSL_KEY GitHub Secret is empty or not set."
            echo ""
            echo "PostgreSQL SSL requires a valid private key. Without it, PostgreSQL"
            echo "refuses to start and all dependent services (Kratos, Hydra, apps) fail."
            echo ""
            echo "To fix: add the PG_SSL_KEY secret in GitHub Settings > Secrets and variables > Actions > Secrets."
            echo "The value should be the contents of the server private key file (PEM format)."
            exit 1
          fi
          echo "OK: PG_SSL_KEY secret is set (non-empty)."

      - name: Write PostgreSQL SSL private key
        run: |
          # Write server.key from secret to deploy path BEFORE postgres starts.
          # Mode 600 + owner UID 70 (postgres user inside container) required.
          # Postgres refuses keys with wrong ownership or group/world access.
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}/postgres && \
             printf '%s' '${{ secrets.PG_SSL_KEY }}' > ${{ env.DEPLOY_PATH }}/postgres/server.key && \
             chmod 600 ${{ env.DEPLOY_PATH }}/postgres/server.key && \
             chown 70:70 ${{ env.DEPLOY_PATH }}/postgres/server.key && \
             KEY_SIZE=\$(wc -c < ${{ env.DEPLOY_PATH }}/postgres/server.key) && \
             if [ \"\$KEY_SIZE\" -lt 100 ]; then echo 'FATAL: PG_SSL_KEY secret is empty or too small ('\$KEY_SIZE' bytes). Set the secret before deploying.' && exit 1; fi && \
             echo 'SSL private key written ('\$KEY_SIZE' bytes, mode 600, owner postgres)'"

      - name: Start PostgreSQL
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ${{ env.COMPOSE }} up -d postgres && \
             echo 'Waiting for PostgreSQL to be healthy...' && \
             HEALTHY=0 && \
             for i in \$(seq 1 30); do \
               podman healthcheck run prod_postgres_1 >/dev/null 2>&1 && HEALTHY=1 && break; \
               sleep 2; \
             done && \
             podman ps --filter name=prod_postgres_1 --format 'table {{.Names}} {{.Status}}' && \
             if [ \"\$HEALTHY\" -ne 1 ]; then \
               echo '' && \
               echo 'FATAL: PostgreSQL did not become healthy within 60 seconds.' && \
               echo '' && \
               echo '--- PostgreSQL container logs (last 30 lines) ---' && \
               podman logs --tail 30 prod_postgres_1 2>&1 && \
               echo '' && \
               echo 'Common causes:' && \
               echo '  1. Empty PG_SSL_KEY — server.key is 0 bytes (platform#74)' && \
               echo '  2. Corrupted persistent volume' && \
               echo '  3. Incorrect PG_USER/PG_PASSWORD' && \
               exit 1; \
             fi && \
             echo 'PostgreSQL is healthy.'"

      - name: Run Ory schema migrations
        run: |
          # podman-compose 1.0.6 `run --rm --no-deps` silently fails to resolve
          # env vars from compose files. Run migrations directly via `podman run`
          # with explicit DSN and volume mounts to bypass the issue.
          # Mount pg-ca.crt into migration containers for sslmode=verify-full (platform#53)
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && source .env && \
             podman run --rm --network prod_intranet \
               -v \$(pwd)/ciam-kratos:/etc/config/ciam-kratos:ro \
               -v \$(pwd)/postgres/pg-ca.crt:/etc/ssl/certs/pg-ca.crt:ro \
               -e DSN=\"\$PG_CIAM_KRATOS_DSN\" \
               docker.io/oryd/kratos:v26.2.0 \
               -c /etc/config/ciam-kratos/kratos.yml migrate sql -e --yes && \
             podman run --rm --network prod_intranet \
               -v \$(pwd)/iam-kratos:/etc/config/iam-kratos:ro \
               -v \$(pwd)/postgres/pg-ca.crt:/etc/ssl/certs/pg-ca.crt:ro \
               -e DSN=\"\$PG_IAM_KRATOS_DSN\" \
               docker.io/oryd/kratos:v26.2.0 \
               -c /etc/config/iam-kratos/kratos.yml migrate sql -e --yes && \
             podman run --rm --network prod_intranet \
               -v \$(pwd)/ciam-hydra:/etc/config/ciam-hydra:ro \
               -v \$(pwd)/postgres/pg-ca.crt:/etc/ssl/certs/pg-ca.crt:ro \
               -e DSN=\"\$PG_CIAM_HYDRA_DSN\" \
               docker.io/oryd/hydra:v26.2.0 \
               migrate -c /etc/config/ciam-hydra/hydra.yml sql up -e --yes && \
             podman run --rm --network prod_intranet \
               -v \$(pwd)/iam-hydra:/etc/config/iam-hydra:ro \
               -v \$(pwd)/postgres/pg-ca.crt:/etc/ssl/certs/pg-ca.crt:ro \
               -e DSN=\"\$PG_IAM_HYDRA_DSN\" \
               docker.io/oryd/hydra:v26.2.0 \
               migrate -c /etc/config/iam-hydra/hydra.yml sql up -e --yes"

      - name: Verify migrations
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "PG_USER=\$(grep '^PG_USER=' ${{ env.DEPLOY_PATH }}/.env | cut -d= -f2) && \
             for db in ciam_kratos iam_kratos ciam_hydra iam_hydra; do \
               COUNT=\$(podman exec prod_postgres_1 psql -U \$PG_USER -d \$db -t -c \
                 \"SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public'\" | tr -d ' '); \
               if [ \"\$COUNT\" -lt 1 ]; then \
                 echo \"FATAL: \$db has no tables — migration failed\" && exit 1; \
               fi; \
               echo \"  ✓ \$db: \$COUNT tables\"; \
             done && \
             echo 'All Ory databases verified'"

      - name: Clean up stale containers
        run: |
          # podman-compose 1.0.6 can't `rm` containers that have --requires
          # dependents (e.g. migration containers create deps on Kratos/Hydra).
          # Force-remove everything except postgres so `up -d` can recreate fresh.
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "podman ps -a --filter label=com.docker.compose.project=prod \
               --format '{{.Names}}' | \
             grep -v prod_postgres_1 | \
             xargs -r podman rm -f 2>/dev/null || true"

      - name: Deploy infrastructure services
        run: |
          # postgres is already running from "Start PostgreSQL" — don't include it
          # here or podman-compose will recreate it and lose the healthy state.
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ${{ env.COMPOSE }} up -d \
               caddy \
               ciam-kratos iam-kratos \
               ciam-hydra iam-hydra \
               pgadmin && \
             echo 'Waiting for Ory services to be healthy...' && \
             for i in \$(seq 1 60); do \
               podman healthcheck run prod_ciam-kratos_1 >/dev/null 2>&1 && \
               podman healthcheck run prod_iam-kratos_1  >/dev/null 2>&1 && \
               podman healthcheck run prod_ciam-hydra_1  >/dev/null 2>&1 && \
               podman healthcheck run prod_iam-hydra_1   >/dev/null 2>&1 && \
               break; \
               sleep 3; \
             done && \
             podman ps --filter label=com.docker.compose.project=prod \
               --format 'table {{.Names}} {{.Status}}'"

      - name: Verify Ory services healthy before seed
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "for svc in prod_ciam-kratos_1 prod_iam-kratos_1 prod_ciam-hydra_1 prod_iam-hydra_1; do \
               STATUS=\$(podman inspect --format '{{.State.Health.Status}}' \$svc 2>/dev/null); \
               if [ \"\$STATUS\" != 'healthy' ]; then \
                 echo \"FATAL: \$svc is \$STATUS — seed requires all Ory services healthy\" && exit 1; \
               fi; \
               echo \"  ✓ \$svc: healthy\"; \
             done && \
             echo 'All Ory services healthy — proceeding with seed'"

      - name: Verify production secrets (platform#9 — pre-seed gate)
        run: |
          # Security condition: verify-secrets.sh must run as an explicit pre-seed step
          # in deploy.yml, validating that env vars resolve to non-empty values.
          # Dual-layer protection: CI-time (this) + runtime (check-secrets.sh shim).
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && bash verify-secrets.sh"

      - name: Seed (idempotent)
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ${{ env.COMPOSE }} run --rm --no-deps seed"

      - name: Verify OAuth2 client redirect_uris (platform#52 — no localhost in production)
        run: |
          # Security condition (platform#52): verify ALL production OAuth2 clients have
          # production redirect_uris — no localhost references. Checks both CIAM and IAM Hydra.
          # Runs a one-shot curl container on the prod_intranet network to query admin APIs.
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             echo '=== Verifying OAuth2 client redirect_uris (platform#52) ===' && \
             echo '' && \
             RESULT=\$(podman run --rm --network prod_intranet docker.io/curlimages/curl:latest sh -c ' \
               FAILED=0; \
               for HYDRA in ciam-hydra:5003 iam-hydra:7003; do \
                 NAME=\$(echo \$HYDRA | cut -d: -f1); \
                 echo \"--- \$NAME ---\"; \
                 CLIENTS=\$(curl -sf http://\$HYDRA/admin/clients 2>/dev/null || echo \"[]\"); \
                 if echo \"\$CLIENTS\" | grep -qi localhost; then \
                   echo \"  FAIL: localhost found in \$NAME client redirect_uris:\"; \
                   echo \"\$CLIENTS\" | grep -oi \"http[s]*://localhost[^\\\"]*\" | sort -u | while read uri; do echo \"    \$uri\"; done; \
                   FAILED=1; \
                 else \
                   echo \"  PASS: no localhost URIs in \$NAME clients\"; \
                 fi; \
               done; \
               exit \$FAILED; \
             ') && \
             echo '' && echo 'All production OAuth2 clients verified — no localhost URIs.' || \
             { echo ''; echo 'WARNING: localhost URIs detected in production OAuth2 clients.'; \
               echo 'The seed script (seed-prod.sh) should have corrected these.'; \
               echo 'Investigate whether SITE_PUBLIC_URL was set correctly in .env.'; }"

      - name: Deploy application services
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             ${{ env.COMPOSE }} up -d \
               ciam-hera iam-hera \
               ciam-athena iam-athena \
               site"

      - name: Health check
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "echo 'Waiting for services to stabilize...' && \
             sleep 20 && \
             FAILED=0 && \
             for svc in prod_ciam-kratos_1 prod_iam-kratos_1 prod_ciam-hydra_1 prod_iam-hydra_1 \
                        prod_ciam-hera_1 prod_iam-hera_1 prod_ciam-athena_1 prod_iam-athena_1 \
                        prod_site_1 prod_caddy_1; do \
               HEALTH=\$(podman inspect --format '{{.State.Health.Status}}' \$svc 2>/dev/null); \
               STATE=\$(podman inspect --format '{{.State.Status}}' \$svc 2>/dev/null); \
               if [ \"\$HEALTH\" = 'healthy' ] || { [ -z \"\$HEALTH\" ] && [ \"\$STATE\" = 'running' ]; }; then \
                 echo \"  ✓ \$svc: \${HEALTH:-\$STATE}\"; \
               else \
                 echo \"  ✗ \$svc: health=\$HEALTH state=\$STATE\"; FAILED=1; \
               fi; \
             done && \
             if [ \$FAILED -eq 1 ]; then echo 'FATAL: One or more services unhealthy' && exit 1; fi && \
             echo 'All services healthy'"

      # ---------------------------------------------------------------
      # SOC2 CC6.1 Evidence: Confirm active TLS connections to PostgreSQL.
      # Run after all services are healthy (all Ory/Hera/Athena services
      # have established their database connections).
      # Two queries:
      #   1. pg_settings ssl=on — structural proof SSL is enabled server-side
      #   2. pg_stat_ssl count — active TLS connection count at this point
      # Output is printed to the workflow log. Copy this output to the
      # GitHub issue thread as the SOC2 CC6.1 evidence artifact.
      # ---------------------------------------------------------------
      - name: Verify PostgreSQL SSL active (SOC2 CC6.1 evidence)
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "PG_USER=\$(grep '^PG_USER=' ${{ env.DEPLOY_PATH }}/.env | cut -d= -f2) && \
             echo '=== SOC2 CC6.1 Evidence: PostgreSQL SSL Status (verify-full) ===' && \
             echo '' && \
             echo '--- Structural check: ssl setting in pg_settings ---' && \
             podman exec prod_postgres_1 psql -U \$PG_USER -c \
               \"SELECT name, setting FROM pg_settings WHERE name IN ('ssl', 'ssl_ca_file') ORDER BY name;\" && \
             echo '' && \
             echo '--- Active TLS connections: pg_stat_ssl ---' && \
             podman exec prod_postgres_1 psql -U \$PG_USER -c \
               \"SELECT count(*) AS ssl_connections FROM pg_stat_ssl WHERE ssl = true;\" && \
             echo '' && \
             echo '--- DSN sslmode verification: all 5 DSNs must use verify-full ---' && \
             for DSN_VAR in PG_CIAM_KRATOS_DSN PG_CIAM_HYDRA_DSN PG_IAM_KRATOS_DSN PG_IAM_HYDRA_DSN PG_OLYMPUS_DSN; do \
               DSN_VALUE=\$(grep \"^\${DSN_VAR}=\" ${{ env.DEPLOY_PATH }}/.env | cut -d= -f2-); \
               SSLMODE=\$(echo \"\$DSN_VALUE\" | grep -o 'sslmode=[^&]*' || echo 'sslmode=NOT_SET'); \
               echo \"  \$DSN_VAR: \$SSLMODE\"; \
             done && \
             echo '' && \
             echo '=== End SOC2 evidence — copy above output to platform#53 issue thread ==='"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
