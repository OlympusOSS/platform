services:
  # ============================================================
  # PostgreSQL (shared database)
  # ============================================================

  postgres:
    image: docker.io/postgres:18-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    volumes:
      - type: volume
        source: postgres
        target: /var/lib/postgresql/data
      - type: bind
        source: ./init-db.sql
        target: /docker-entrypoint-initdb.d/init-db.sql
    networks:
      - intranet
    restart: unless-stopped

  # ============================================================
  # pgAdmin (database management UI)
  # ============================================================

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    # No direct host port — accessed via Caddy on :5433 (rate-limit enforcement)
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@demo.user
      - PGADMIN_DEFAULT_PASSWORD=admin123!
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGPASSFILE=/pgpass
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - type: bind
        source: ./pgadmin-servers.json
        target: /pgadmin4/servers.json
      - type: bind
        source: ./pgadmin/config_local.py
        target: /pgadmin4/config_local.py
      - type: bind
        source: ./pgadmin/pgpass
        target: /pgpass
    entrypoint: >
      /bin/sh -c "
      cp /pgpass /tmp/pgpass &&
      chmod 0600 /tmp/pgpass &&
      export PGPASSFILE=/tmp/pgpass &&
      exec /entrypoint.sh
      "
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - postgres

  # ============================================================
  # Mail Service for Testing
  # ============================================================

  mailslurper:
    image: docker.io/oryd/mailslurper:latest-smtps
    ports:
      - '5434:4436'
    networks:
      - intranet

  # ============================================================
  # Caddy (Reverse Proxy — with per-IP rate limiting on CIAM login routes)
  #
  # Uses a custom Caddy image built with mholt/caddy-ratelimit (SR-CADDY-1).
  # The standard caddy:2-alpine does not include this module.
  # See platform/caddy/Containerfile for build details.
  #
  # Caddy is the single ingress for all app services. Kratos admin/public
  # ports (3100/3101, 4100/4101) and Hydra admin ports (3103, 4103) retain
  # direct host bindings for debugging convenience.
  # ============================================================

  caddy:
    image: dev-caddy
    build:
      context: ../caddy
      dockerfile: Containerfile
    ports:
      - '2000:2000'  # Site
      - '3000:3000'  # CIAM Hera
      - '3001:3001'  # CIAM Athena
      - '3102:3102'  # CIAM Hydra public
      - '4000:4000'  # IAM Hera
      - '4001:4001'  # IAM Athena
      - '4102:4102'  # IAM Hydra public
      - '5433:5433'  # pgAdmin
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - ciam-hera
      - ciam-hydra
      - ciam-athena
      - iam-hera
      - iam-hydra
      - iam-athena
      - site
      - pgadmin

  # ============================================================
  # CIAM Kratos (Identity Admin)
  # ============================================================

  ciam-kratos-migrate:
    image: docker.io/oryd/kratos:v26.2.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_kratos?sslmode=disable
    volumes:
      - type: bind
        source: ./ciam-kratos
        target: /etc/config/ciam-kratos
    command: -c /etc/config/ciam-kratos/kratos.yml migrate sql -e --yes
    restart: on-failure
    networks:
      - intranet

  ciam-kratos:
    depends_on:
      - ciam-kratos-migrate
    image: docker.io/oryd/kratos:v26.2.0
    ports:
      - '3100:5000' # public
      - '3101:5001' # admin
    restart: unless-stopped
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_kratos?sslmode=disable
      - LOG_LEVEL=trace
      - SERVE_PUBLIC_PORT=5000
      - SERVE_ADMIN_PORT=5001
    command: serve -c /etc/config/ciam-kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: ./ciam-kratos
        target: /etc/config/ciam-kratos
    networks:
      - intranet

  # ============================================================
  # IAM Kratos (Internal IAM)
  # ============================================================

  iam-kratos-migrate:
    image: docker.io/oryd/kratos:v26.2.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_kratos?sslmode=disable
    volumes:
      - type: bind
        source: ./iam-kratos
        target: /etc/config/iam-kratos
    command: -c /etc/config/iam-kratos/kratos.yml migrate sql -e --yes
    restart: on-failure
    networks:
      - intranet

  iam-kratos:
    depends_on:
      - iam-kratos-migrate
    image: docker.io/oryd/kratos:v26.2.0
    ports:
      - '4100:7000' # public
      - '4101:7001' # admin
    restart: unless-stopped
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_kratos?sslmode=disable
      - LOG_LEVEL=trace
      - SERVE_PUBLIC_PORT=7000
      - SERVE_ADMIN_PORT=7001
    command: serve -c /etc/config/iam-kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: ./iam-kratos
        target: /etc/config/iam-kratos
    networks:
      - intranet

  # ============================================================
  # CIAM Hydra OAuth2
  # ============================================================

  ciam-hydra-migrate:
    image: docker.io/oryd/hydra:v26.2.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_hydra?sslmode=disable
    command: migrate -c /etc/config/ciam-hydra/hydra.yml sql up -e --yes
    volumes:
      - type: bind
        source: ./ciam-hydra
        target: /etc/config/ciam-hydra
    restart: on-failure
    networks:
      - intranet

  ciam-hydra:
    image: docker.io/oryd/hydra:v26.2.0
    ports:
      # Public port proxied via Caddy on :3102 — no direct host binding to avoid conflict
      - '3103:5003' # admin (direct — not fronted by Caddy)
    command: serve -c /etc/config/ciam-hydra/hydra.yml all --dev
    volumes:
      - type: bind
        source: ./ciam-hydra
        target: /etc/config/ciam-hydra
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_hydra?sslmode=disable
      - SERVE_PUBLIC_PORT=5002
      - SERVE_ADMIN_PORT=5003
    restart: unless-stopped
    depends_on:
      - ciam-hydra-migrate
    networks:
      - intranet

  # ============================================================
  # IAM Hydra (Internal OAuth2)
  # ============================================================

  iam-hydra-migrate:
    image: docker.io/oryd/hydra:v26.2.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_hydra?sslmode=disable
    command: migrate -c /etc/config/iam-hydra/hydra.yml sql up -e --yes
    volumes:
      - type: bind
        source: ./iam-hydra
        target: /etc/config/iam-hydra
    restart: on-failure
    networks:
      - intranet

  iam-hydra:
    image: docker.io/oryd/hydra:v26.2.0
    depends_on:
      - iam-hydra-migrate
    ports:
      # Public port proxied via Caddy on :4102 — no direct host binding to avoid conflict
      - '4103:7003' # admin (direct — not fronted by Caddy)
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_hydra?sslmode=disable
      - SERVE_PUBLIC_PORT=7002
      - SERVE_ADMIN_PORT=7003
    command: serve -c /etc/config/iam-hydra/hydra.yml all --dev
    volumes:
      - type: bind
        source: ./iam-hydra
        target: /etc/config/iam-hydra
    restart: unless-stopped
    networks:
      - intranet

  # ============================================================
  # IAM Hera (Authentication UI for iam-kratos + iam-hydra)
  # ============================================================

  iam-hera:
    image: dev-hera
    build:
      context: ../../hera
      dockerfile: Containerfile.dev
      secrets:
        - npmrc
    # No direct host port — accessed via Caddy on :4000
    environment:
      - PORT=4000
      - HYDRA_ADMIN_URL=http://iam-hydra:7003
      - KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - KRATOS_ADMIN_URL=http://iam-kratos:7001
      - DEFAULT_OAUTH2_CLIENT_ID=athena-iam-client
      - HYDRA_PUBLIC_URL=http://localhost:4102
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - CAPTCHA_SECRET_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=iam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
      - APP_INSTANCE=IAM
      - NEXT_PUBLIC_APP_INSTANCE=IAM
      - WATCHPACK_POLLING=true
    command: ["sh", "-c", "cp /tmp/.npmrc /app/.npmrc 2>/dev/null; bun install 2>/dev/null; rm -f /app/.npmrc; bun run dev"]
    volumes:
      - ../../hera:/app
      - /app/node_modules/.cache
      - /app/.next
      - ./.npmrc:/tmp/.npmrc:ro
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - iam-hydra
      - iam-kratos

  # ============================================================
  # CIAM Hera (Authentication UI for ciam-kratos + ciam-hydra)
  # ============================================================

  ciam-hera:
    image: dev-hera
    build:
      context: ../../hera
      dockerfile: Containerfile.dev
      secrets:
        - npmrc
    # No direct host port — accessed via Caddy on :3000 (rate-limit enforcement)
    environment:
      - PORT=3000
      - HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - KRATOS_PUBLIC_URL=http://ciam-kratos:5000
      - KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - DEFAULT_OAUTH2_CLIENT_ID=site-ciam-client
      - HYDRA_PUBLIC_URL=http://localhost:3102
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - CAPTCHA_SECRET_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=ciam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
      - APP_INSTANCE=CIAM
      - NEXT_PUBLIC_APP_INSTANCE=CIAM
      - WATCHPACK_POLLING=true
    command: ["sh", "-c", "cp /tmp/.npmrc /app/.npmrc 2>/dev/null; bun install 2>/dev/null; rm -f /app/.npmrc; bun run dev"]
    volumes:
      - ../../hera:/app
      - /app/node_modules/.cache
      - /app/.next
      - ./.npmrc:/tmp/.npmrc:ro
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - ciam-hydra
      - ciam-kratos

  # ============================================================
  # CIAM Athena (CIAM Admin Panel)
  # ============================================================

  ciam-athena:
    image: dev-athena
    build:
      context: ../../athena
      dockerfile: Containerfile.dev
      secrets:
        - npmrc
    # No direct host port — accessed via Caddy on :3001
    environment:
      - NODE_ENV=development
      - KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - KRATOS_PUBLIC_URL=http://ciam-kratos:5000
      - HYDRA_PUBLIC_URL=http://ciam-hydra:5002
      - HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - IAM_KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - NEXT_PUBLIC_IAM_HYDRA_PUBLIC_URL=http://localhost:4102
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - NEXT_PUBLIC_AUTH_HYDRA_URL=http://localhost:4102
      - AUTH_HYDRA_URL=http://iam-hydra:7002
      - AUTH_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - AUTH_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - OAUTH_CLIENT_ID=athena-ciam-client
      - OAUTH_CLIENT_SECRET=athena-ciam-secret
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_INSTANCE=CIAM
      - WATCHPACK_POLLING=true
      - APP_INSTANCE=CIAM
      - DEFAULT_CLIENT_ID=site-ciam-client
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=ciam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
      # Stack health checks (own domain only)
      - ATHENA_INTERNAL_URL=http://ciam-athena:3000
      - HERA_INTERNAL_URL=http://ciam-hera:3000
    command: ["sh", "-c", "cp /tmp/.npmrc /app/.npmrc 2>/dev/null; bun install 2>/dev/null; rm -f /app/.npmrc; bun run dev"]
    volumes:
      - ../../athena:/app
      - /app/node_modules/.cache
      - /app/.next
      - ./.npmrc:/tmp/.npmrc:ro
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - ciam-kratos
      - iam-kratos
      - iam-hydra

  # ============================================================
  # IAM Athena (IAM Admin Panel)
  # ============================================================

  iam-athena:
    image: dev-athena
    build:
      context: ../../athena
      dockerfile: Containerfile.dev
      secrets:
        - npmrc
    # No direct host port — accessed via Caddy on :4001
    environment:
      - NODE_ENV=development
      - KRATOS_ADMIN_URL=http://iam-kratos:7001
      - KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - HYDRA_ADMIN_URL=http://iam-hydra:7003
      - IAM_KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - NEXT_PUBLIC_IAM_HYDRA_PUBLIC_URL=http://localhost:4102
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - NEXT_PUBLIC_AUTH_HYDRA_URL=http://localhost:4102
      - AUTH_HYDRA_URL=http://iam-hydra:7002
      - AUTH_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - AUTH_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - OAUTH_CLIENT_ID=athena-iam-client
      - OAUTH_CLIENT_SECRET=athena-iam-secret
      - NEXT_PUBLIC_APP_URL=http://localhost:4001
      - NEXT_PUBLIC_APP_INSTANCE=IAM
      - WATCHPACK_POLLING=true
      - APP_INSTANCE=IAM
      - DEFAULT_CLIENT_ID=athena-iam-client
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=iam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
      # Stack health checks (own domain only)
      - ATHENA_INTERNAL_URL=http://iam-athena:3000
      - HERA_INTERNAL_URL=http://iam-hera:4000
    command: ["sh", "-c", "cp /tmp/.npmrc /app/.npmrc 2>/dev/null; bun install 2>/dev/null; rm -f /app/.npmrc; bun run dev"]
    volumes:
      - ../../athena:/app
      - /app/node_modules/.cache
      - /app/.next
      - ./.npmrc:/tmp/.npmrc:ro
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - iam-kratos
      - iam-hydra

  # ============================================================
  # Site (brochure site & OAuth2 playground)
  # ============================================================

  site:
    image: dev-site
    build:
      context: ../../site
      dockerfile: Containerfile.dev
      secrets:
        - npmrc
    # No direct host port — accessed via Caddy on :2000
    environment:
      - CIAM_HYDRA_PUBLIC_URL=http://ciam-hydra:5002
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - CIAM_HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - CIAM_KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - NEXT_PUBLIC_APP_URL=http://localhost:2000
      - NEXT_PUBLIC_CIAM_ATHENA_URL=http://localhost:3001
      - NEXT_PUBLIC_IAM_ATHENA_URL=http://localhost:4001
      - WATCHPACK_POLLING=true
    command: ["sh", "-c", "cp /tmp/.npmrc /app/.npmrc 2>/dev/null; bun install 2>/dev/null; rm -f /app/.npmrc; bun run dev"]
    volumes:
      - ../../site:/app
      - /app/node_modules/.cache
      - /app/.next
      - ./.npmrc:/tmp/.npmrc:ro
    networks:
      - intranet
    restart: unless-stopped

  # ============================================================
  # Dev Seed (identities + OAuth2 clients)
  # ============================================================

  athena-seed-dev:
    image: docker.io/postgres:18-alpine
    depends_on:
      - postgres
      - iam-kratos
      - ciam-kratos
      - ciam-hydra
      - iam-hydra
    environment:
      - PGHOST=postgres
      - PGUSER=postgres
      - PGPASSWORD=secret
      - PGDATABASE=olympus
    volumes:
      - type: bind
        source: ./iam-seed-dev.sh
        target: /iam-seed-dev.sh
    networks:
      - intranet
    command: sh -c "apk add --no-cache curl > /dev/null 2>&1 && sh /iam-seed-dev.sh"
    restart: 'no'

networks:
  intranet:

volumes:
  postgres:
  caddy_data:
  caddy_config:

secrets:
  npmrc:
    file: .npmrc
