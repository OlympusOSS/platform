services:
  # ============================================================
  # PostgreSQL (shared database)
  # ============================================================

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    volumes:
      - type: volume
        source: postgres
        target: /var/lib/postgresql/data
      - type: bind
        source: ./init-db.sql
        target: /docker-entrypoint-initdb.d/init-db.sql
    networks:
      - intranet
    restart: unless-stopped

  # ============================================================
  # pgAdmin (database management UI)
  # ============================================================

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - '4000:80'
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@demo.user
      - PGADMIN_DEFAULT_PASSWORD=admin123!
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGPASSFILE=/pgpass
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - type: bind
        source: ./pgadmin-servers.json
        target: /pgadmin4/servers.json
      - type: bind
        source: ./pgadmin/config_local.py
        target: /pgadmin4/config_local.py
      - type: bind
        source: ./pgadmin/pgpass
        target: /pgpass
    entrypoint: >
      /bin/sh -c "
      cp /pgpass /tmp/pgpass &&
      chmod 0600 /tmp/pgpass &&
      export PGPASSFILE=/tmp/pgpass &&
      exec /entrypoint.sh
      "
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - postgres

  # ============================================================
  # Mail Service for Testing
  # ============================================================

  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - '4436:4436'
    networks:
      - intranet

  # ============================================================
  # CIAM Kratos (Identity Admin)
  # ============================================================

  ciam-kratos-migrate:
    image: oryd/kratos:v25.4.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_kratos?sslmode=disable
    volumes:
      - type: bind
        source: ./ciam-kratos
        target: /etc/config/ciam-kratos
    command: -c /etc/config/ciam-kratos/kratos.yml migrate sql -e --yes
    restart: on-failure
    networks:
      - intranet

  ciam-kratos:
    depends_on:
      - ciam-kratos-migrate
    image: oryd/kratos:v25.4.0
    ports:
      - '3100:5000' # public
      - '3101:5001' # admin
    restart: unless-stopped
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_kratos?sslmode=disable
      - LOG_LEVEL=trace
      - SERVE_PUBLIC_PORT=5000
      - SERVE_ADMIN_PORT=5001
    command: serve -c /etc/config/ciam-kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: ./ciam-kratos
        target: /etc/config/ciam-kratos
    networks:
      - intranet

  # ============================================================
  # IAM Kratos (Internal IAM)
  # ============================================================

  iam-kratos-migrate:
    image: oryd/kratos:v25.4.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_kratos?sslmode=disable
    volumes:
      - type: bind
        source: ./iam-kratos
        target: /etc/config/iam-kratos
    command: -c /etc/config/iam-kratos/kratos.yml migrate sql -e --yes
    restart: on-failure
    networks:
      - intranet

  iam-kratos:
    depends_on:
      - iam-kratos-migrate
    image: oryd/kratos:v25.4.0
    ports:
      - '4100:7000'
      - '4101:7001'
    restart: unless-stopped
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_kratos?sslmode=disable
      - LOG_LEVEL=trace
      - SERVE_PUBLIC_PORT=7000
      - SERVE_ADMIN_PORT=7001
    command: serve -c /etc/config/iam-kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: ./iam-kratos
        target: /etc/config/iam-kratos
    networks:
      - intranet

  # ============================================================
  # CIAM Hydra OAuth2
  # ============================================================

  ciam-hydra-migrate:
    image: oryd/hydra:v25.4.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_hydra?sslmode=disable
    command: migrate -c /etc/config/ciam-hydra/hydra.yml sql up -e --yes
    volumes:
      - type: bind
        source: ./ciam-hydra
        target: /etc/config/ciam-hydra
    restart: on-failure
    networks:
      - intranet

  ciam-hydra:
    image: oryd/hydra:v25.4.0
    ports:
      - '3102:5002' # public
      - '3103:5003' # admin
    command: serve -c /etc/config/ciam-hydra/hydra.yml all --dev
    volumes:
      - type: bind
        source: ./ciam-hydra
        target: /etc/config/ciam-hydra
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/ciam_hydra?sslmode=disable
      - SERVE_PUBLIC_PORT=5002
      - SERVE_ADMIN_PORT=5003
    restart: unless-stopped
    depends_on:
      - ciam-hydra-migrate
    networks:
      - intranet

  # ============================================================
  # IAM Hydra (Internal OAuth2)
  # ============================================================

  iam-hydra-migrate:
    image: oryd/hydra:v25.4.0
    depends_on:
      - postgres
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_hydra?sslmode=disable
    command: migrate -c /etc/config/iam-hydra/hydra.yml sql up -e --yes
    volumes:
      - type: bind
        source: ./iam-hydra
        target: /etc/config/iam-hydra
    restart: on-failure
    networks:
      - intranet

  iam-hydra:
    image: oryd/hydra:v25.4.0
    depends_on:
      - iam-hydra-migrate
    ports:
      - '4102:7002'
      - '4103:7003'
    environment:
      - DSN=postgres://postgres:secret@postgres:5432/iam_hydra?sslmode=disable
      - SERVE_PUBLIC_PORT=7002
      - SERVE_ADMIN_PORT=7003
    command: serve -c /etc/config/iam-hydra/hydra.yml all --dev
    volumes:
      - type: bind
        source: ./iam-hydra
        target: /etc/config/iam-hydra
    restart: unless-stopped
    networks:
      - intranet

  # ============================================================
  # IAM Hera (Authentication UI for iam-kratos + iam-hydra)
  # ============================================================

  iam-hera:
    image: dev-hera
    build:
      context: ../../hera
      dockerfile: Dockerfile.dev
      secrets:
        - npmrc
    ports:
      - '4001:4001'
    environment:
      - PORT=4001
      - HYDRA_ADMIN_URL=http://iam-hydra:7003
      - KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - KRATOS_ADMIN_URL=http://iam-kratos:7001
      - DEFAULT_OAUTH2_CLIENT_ID=athena-iam-client
      - HYDRA_PUBLIC_URL=http://localhost:4102
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - CAPTCHA_SECRET_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=iam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
    command: ["sh", "-c", "cd /sdk && bun install --frozen-lockfile 2>/dev/null; cd /app && rm -rf node_modules/@olympusoss/sdk && ln -s /sdk node_modules/@olympusoss/sdk && bun run dev"]
    volumes:
      - ../../hera:/app
      - ../../sdk:/sdk
      - /app/node_modules
      - /app/.next
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - iam-hydra
      - iam-kratos

  # ============================================================
  # CIAM Hera (Authentication UI for ciam-kratos + ciam-hydra)
  # ============================================================

  ciam-hera:
    image: dev-hera
    build:
      context: ../../hera
      dockerfile: Dockerfile.dev
      secrets:
        - npmrc
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - KRATOS_PUBLIC_URL=http://ciam-kratos:5000
      - KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - DEFAULT_OAUTH2_CLIENT_ID=site-ciam-client
      - HYDRA_PUBLIC_URL=http://localhost:3102
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - CAPTCHA_SECRET_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=ciam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
    command: ["sh", "-c", "cd /sdk && bun install --frozen-lockfile 2>/dev/null; cd /app && rm -rf node_modules/@olympusoss/sdk && ln -s /sdk node_modules/@olympusoss/sdk && bun run dev"]
    volumes:
      - ../../hera:/app
      - ../../sdk:/sdk
      - /app/node_modules
      - /app/.next
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - ciam-hydra
      - ciam-kratos

  # ============================================================
  # CIAM Athena (CIAM Admin Panel)
  # ============================================================

  ciam-athena:
    image: dev-athena
    build:
      context: ../../athena
      dockerfile: Dockerfile.dev
      secrets:
        - npmrc
    ports:
      - '3003:3000'
    environment:
      - NODE_ENV=development
      - KRATOS_ADMIN_URL=http://ciam-kratos:5001
      - KRATOS_PUBLIC_URL=http://ciam-kratos:5000
      - HYDRA_PUBLIC_URL=http://ciam-hydra:5002
      - HYDRA_ADMIN_URL=http://ciam-hydra:5003
      - IAM_KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - NEXT_PUBLIC_IAM_HYDRA_PUBLIC_URL=http://localhost:4102
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - OAUTH_CLIENT_ID=athena-ciam-client
      - OAUTH_CLIENT_SECRET=athena-ciam-secret
      - NEXT_PUBLIC_APP_URL=http://localhost:3003
      - NEXT_PUBLIC_APP_INSTANCE=CIAM
      - DEFAULT_CLIENT_ID=site-ciam-client
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=ciam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
      # Cross-service health checks
      - CIAM_HERA_INTERNAL_URL=http://ciam-hera:3001
      - IAM_HERA_INTERNAL_URL=http://iam-hera:4001
      - CIAM_ATHENA_INTERNAL_URL=http://ciam-athena:3000
      - IAM_ATHENA_INTERNAL_URL=http://iam-athena:3000
    command: ["sh", "-c", "cd /canvas && bun install --frozen-lockfile 2>/dev/null; cd /sdk && bun install --frozen-lockfile 2>/dev/null; cd /app && rm -rf node_modules/@olympusoss/canvas && ln -s /canvas node_modules/@olympusoss/canvas && rm -rf node_modules/@olympusoss/sdk && ln -s /sdk node_modules/@olympusoss/sdk && bun run dev"]
    volumes:
      - ../../athena:/app
      - ../../canvas:/canvas
      - ../../sdk:/sdk
      - /app/node_modules
      - /app/.next
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - ciam-kratos
      - iam-kratos
      - iam-hydra

  # ============================================================
  # IAM Athena (IAM Admin Panel)
  # ============================================================

  iam-athena:
    image: dev-athena
    build:
      context: ../../athena
      dockerfile: Dockerfile.dev
      secrets:
        - npmrc
    ports:
      - '4003:3000'
    environment:
      - NODE_ENV=development
      - KRATOS_ADMIN_URL=http://iam-kratos:7001
      - KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - HYDRA_ADMIN_URL=http://iam-hydra:7003
      - IAM_KRATOS_PUBLIC_URL=http://iam-kratos:7000
      - IAM_KRATOS_ADMIN_URL=http://iam-kratos:7001
      - NEXT_PUBLIC_IAM_HYDRA_PUBLIC_URL=http://localhost:4102
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - IAM_HYDRA_ADMIN_URL=http://iam-hydra:7003
      - OAUTH_CLIENT_ID=athena-iam-client
      - OAUTH_CLIENT_SECRET=athena-iam-secret
      - NEXT_PUBLIC_APP_URL=http://localhost:4003
      - NEXT_PUBLIC_APP_INSTANCE=IAM
      - DEFAULT_CLIENT_ID=athena-iam-client
      - CAPTCHA_ENABLED=false
      - CAPTCHA_SITE_KEY=
      - DATABASE_URL=postgres://postgres:secret@postgres:5432/olympus?sslmode=disable
      - SETTINGS_TABLE=iam_settings
      - ENCRYPTION_KEY=dev-encryption-key-minimum-32-chars!!
      # Cross-service health checks
      - CIAM_HERA_INTERNAL_URL=http://ciam-hera:3001
      - IAM_HERA_INTERNAL_URL=http://iam-hera:4001
      - CIAM_ATHENA_INTERNAL_URL=http://ciam-athena:3000
      - IAM_ATHENA_INTERNAL_URL=http://iam-athena:3000
    command: ["sh", "-c", "cd /canvas && bun install --frozen-lockfile 2>/dev/null; cd /sdk && bun install --frozen-lockfile 2>/dev/null; cd /app && rm -rf node_modules/@olympusoss/canvas && ln -s /canvas node_modules/@olympusoss/canvas && rm -rf node_modules/@olympusoss/sdk && ln -s /sdk node_modules/@olympusoss/sdk && bun run dev"]
    volumes:
      - ../../athena:/app
      - ../../canvas:/canvas
      - ../../sdk:/sdk
      - /app/node_modules
      - /app/.next
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - iam-kratos
      - iam-hydra

  # ============================================================
  # Site (brochure site & OAuth2 playground)
  # ============================================================

  site:
    image: dev-site
    build:
      context: ../../site
      dockerfile: Dockerfile.dev
      secrets:
        - npmrc
    ports:
      - '2000:3000'
    environment:
      - CIAM_HYDRA_PUBLIC_URL=http://ciam-hydra:5002
      - IAM_HYDRA_PUBLIC_URL=http://iam-hydra:7002
      - NEXT_PUBLIC_APP_URL=http://localhost:2000
      - NEXT_PUBLIC_CIAM_ATHENA_URL=http://localhost:3003
      - NEXT_PUBLIC_IAM_ATHENA_URL=http://localhost:4003
    command: ["sh", "-c", "cd /canvas && bun install --frozen-lockfile 2>/dev/null; cd /app && rm -rf node_modules/@olympusoss/canvas && ln -s /canvas node_modules/@olympusoss/canvas && bun run dev"]
    volumes:
      - ../../site:/app
      - ../../canvas:/canvas
      - /app/node_modules
      - /app/.next
    networks:
      - intranet
    restart: unless-stopped

  # ============================================================
  # Dev Seed (identities + OAuth2 clients)
  # ============================================================

  athena-seed-dev:
    image: curlimages/curl:latest
    depends_on:
      - iam-kratos
      - ciam-kratos
      - ciam-hydra
      - iam-hydra
    volumes:
      - type: bind
        source: ./iam-seed-dev.sh
        target: /iam-seed-dev.sh
    networks:
      - intranet
    command: sh /iam-seed-dev.sh
    restart: 'no'

networks:
  intranet:

volumes:
  postgres:

secrets:
  npmrc:
    file: .npmrc
