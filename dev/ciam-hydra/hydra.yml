serve:
  public:
    port: 5002
  admin:
    port: 5003
  cookies:
    same_site_mode: Lax

urls:
  self:
    issuer: http://localhost:3102
  consent: http://localhost:3000/consent
  login: http://localhost:3000/login
  logout: http://localhost:3000/logout

secrets:
  # DEV ONLY — overridden by SECRETS_SYSTEM env var in compose.prod.yml (platform#9)
  system:
    - ciam-hydra-secret-change-me

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
    pairwise:
      # DEV ONLY — overridden by OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT env var in compose.prod.yml (platform#9)
      salt: ciam-hydra-pairwise-salt
