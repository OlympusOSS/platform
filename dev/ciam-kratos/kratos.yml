version: v0.13.0

dsn: sqlite:///var/lib/sqlite/db.sqlite?_fk=true

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
        - http://localhost:4455
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Session-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://ciam-kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:4455/
  allowed_return_urls:
    - http://localhost:4455
    - http://localhost:3000

  methods:
    password:
      enabled: true
      config:
        min_password_length: 8
        haveibeenpwned_enabled: false
        max_breaches: 0
        identifier_similarity_check_enabled: true
        # V2 block mode: uncomment when the SIGHUP/restart mechanism (ADR-003) is resolved.
        # passwordPolicyUrl: http://ciam-hera:3000/api/policy/password
        # The endpoint returns 200 (allow) or 422 (reject) with Kratos validation error JSON.
        # See platform#12 revised Architecture Brief for the full request/response contract.
        # Caddy explicitly denies external access to this path (platform/dev/Caddyfile and
        # platform/prod/Caddyfile) — Security Condition 1 from the platform#12 security review.
    totp:
      config:
        issuer: Kratos
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true

  flows:
    error:
      ui_url: http://localhost:4455/error

    settings:
      ui_url: http://localhost:4455/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: http://localhost:3000/recovery
      use: code

    verification:
      enabled: true
      ui_url: http://localhost:3000/verification
      use: code
      after:
        default_browser_return_url: http://localhost:3000/login

    logout:
      after:
        default_browser_return_url: http://localhost:4455/login

    login:
      ui_url: http://localhost:3000/login
      lifespan: 10m
      after:
        hooks:
          - hook: require_verified_address

    registration:
      lifespan: 10m
      ui_url: http://localhost:3000/registration
      after:
        password:
          hooks: []

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/ciam-kratos/identity.schema.json
    - id: organizational
      url: file:///etc/config/ciam-kratos/company-identity.schema.json
    - id: customer
      url: file:///etc/config/ciam-kratos/customer.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
