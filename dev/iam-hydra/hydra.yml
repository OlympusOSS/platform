serve:
  public:
    port: 7002
  admin:
    port: 7003
  cookies:
    same_site_mode: Lax

urls:
  self:
    issuer: http://localhost:4102
  consent: http://localhost:4000/consent
  login: http://localhost:4000/login
  logout: http://localhost:4000/logout

secrets:
  # DEV ONLY — overridden by SECRETS_SYSTEM env var in compose.prod.yml (platform#9)
  system:
    - iam-hydra-secret-change-me

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
    pairwise:
      # DEV ONLY — overridden by OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT env var in compose.prod.yml (platform#9)
      salt: iam-hydra-pairwise-salt
  # Note (platform#21): Hydra v26.2.0 does not support oidc.claims_mapper.
  # The 'roles' claim for the pgAdmin DBA role gate is injected via the consent
  # session instead: the IAM login action fetches the identity's 'roles' trait
  # and passes it through the Hydra login context; the consent page reads it
  # and sets session.id_token.roles in AcceptConsentRequest.
  # See hera/src/app/login/actions.ts and hera/src/app/consent/page.tsx.
