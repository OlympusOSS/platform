serve:
  public:
    port: 7002
  admin:
    port: 7003
  cookies:
    same_site_mode: Lax

urls:
  self:
    issuer: http://localhost:4102
  consent: http://localhost:4000/consent
  login: http://localhost:4000/login
  logout: http://localhost:4000/logout

secrets:
  system:
    - iam-hydra-secret-change-me

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
    pairwise:
      salt: iam-hydra-pairwise-salt
  # Claims mapper (platform#21): injects IAM Kratos identity traits into ID tokens.
  # The mapper adds the 'roles' array claim required by pgAdmin's
  # OAUTH2_ADDITIONAL_CLAIMS_VALIDATION hook to enforce 'dba' role access control.
  # Uses null-safe std.get() to handle identities without a 'roles' trait.
  claims_mapper:
    filepath: /etc/config/iam-hydra/pgadmin-claims-mapper.jsonnet
